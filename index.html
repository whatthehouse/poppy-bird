// Hand-drawn vector icon per scene — pure shapes/paths, no font or emoji
// dependency at all, so it renders identically on every device.
function drawThemeIcon(id, cx, cy, s){
  ctx.save(); ctx.translate(cx, cy);
  if (id === 'meadow') {
    ctx.fillStyle = '#5fae37';
    ctx.beginPath(); ctx.ellipse(0, s*0.30, s*0.62, s*0.26, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#7a5230'; ctx.fillRect(-s*0.04, -s*0.06, s*0.08, s*0.24);
    ctx.fillStyle = '#3f7a26';
    ctx.beginPath(); ctx.arc(0, -s*0.18, s*0.22, 0, Math.PI*2); ctx.fill();
  } else if (id === 'ocean') {
    ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.lineWidth = s*0.07; ctx.lineCap = 'round';
    for (let i=-1; i<=1; i++) {
      ctx.beginPath();
      ctx.moveTo(-s*0.5, i*s*0.2);
      ctx.quadraticCurveTo(-s*0.2, i*s*0.2 - s*0.14, 0, i*s*0.2);
      ctx.quadraticCurveTo(s*0.2, i*s*0.2 + s*0.14, s*0.5, i*s*0.2);
      ctx.stroke();
    }
  } else if (id === 'desert') {
    ctx.fillStyle = '#e0a85a';
    ctx.beginPath(); ctx.ellipse(0, s*0.32, s*0.6, s*0.22, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4f8a37';
    ctx.fillRect(-s*0.06, -s*0.22, s*0.12, s*0.42);
    ctx.fillRect(-s*0.22, -s*0.02, s*0.15, s*0.09);
    ctx.fillRect(s*0.07, -s*0.1, s*0.15, s*0.09);
  } else if (id === 'volcano') {
    ctx.fillStyle = '#5a3326';
    ctx.beginPath(); ctx.moveTo(-s*0.45,s*0.4); ctx.lineTo(0,-s*0.4); ctx.lineTo(s*0.45,s*0.4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ff7b3a';
    ctx.beginPath(); ctx.moveTo(-s*0.13,-s*0.3); ctx.lineTo(0,-s*0.58); ctx.lineTo(s*0.13,-s*0.3); ctx.closePath(); ctx.fill();
  } else if (id === 'arctic') {
    ctx.fillStyle = '#dceefc';
    ctx.beginPath(); ctx.moveTo(-s*0.45,s*0.4); ctx.lineTo(0,-s*0.45); ctx.lineTo(s*0.45,s*0.4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#aeefff';
    ctx.beginPath(); ctx.moveTo(-s*0.16,s*0.05); ctx.lineTo(0,-s*0.45); ctx.lineTo(s*0.16,s*0.05); ctx.closePath(); ctx.fill();
  } else if (id === 'city') {
    const hs = [0.5, 0.75, 0.55, 0.85];
    let bx = -s*0.46;
    ctx.fillStyle = '#5b6577';
    for (const h of hs) { const bw=s*0.22; ctx.fillRect(bx, s*0.4-s*h, bw, s*h); bx += bw + s*0.04; }
    ctx.fillStyle = 'rgba(255,230,140,.9)';
    bx = -s*0.46;
    for (const h of hs) { const bw=s*0.22; ctx.fillRect(bx+bw*0.3, s*0.4-s*h+s*0.1, bw*0.3, bw*0.3); bx += bw + s*0.04; }
  } else if (id === 'space') {
    ctx.fillStyle = '#ffb27a';
    ctx.beginPath(); ctx.arc(0,0,s*0.32,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.7)'; ctx.lineWidth = s*0.05;
    ctx.beginPath(); ctx.ellipse(0,0,s*0.5,s*0.16,-0.3,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff';
    for (let i=0;i<5;i++){ const a=i*1.4; ctx.beginPath(); ctx.arc(Math.cos(a)*s*0.55, Math.sin(a)*s*0.3 - s*0.32, 2, 0, Math.PI*2); ctx.fill(); }
  }
  ctx.restore();
}
function drawCheckBadge(cx, cy, r){
  ctx.save(); ctx.translate(cx, cy);
  ctx.fillStyle = '#ffd23f';
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = r*0.32; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(-r*0.45, 0); ctx.lineTo(-r*0.1, r*0.4); ctx.lineTo(r*0.5, -r*0.4);
  ctx.stroke();
  ctx.restore();
}

function drawThemes(){
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,W,H);
  const pw=340, ph=560, px=(W-pw)/2, py=70;
  panel(px,py,pw,ph);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ff7b3a'; ctx.font='bold 26px Mali';
  ctx.fillText('Select Theme', W/2, py+30);
  ctx.fillStyle='#888';
  // too long to safely fit one line on a phone at any readable size — wrap it
  setFont(13, false);
  ctx.fillText('Theme stays all run', W/2, py+50);
  ctx.fillText('(day / night still cycles)', W/2, py+68);

  const cols=2, cw=140, ch=78, gapx=16, gapy=14;
  const gx0 = px + (pw - (cols*cw + (cols-1)*gapx))/2, gy0 = py+96;
  SCENES.forEach((sc,i)=>{
    const col=i%cols, row=(i/cols|0);
    const x=gx0+col*(cw+gapx), y=gy0+row*(ch+gapy);
    const sel = sc.id===endlessTheme;
    // mini sky-gradient swatch as the tile background
    const g = ctx.createLinearGradient(x,y,x,y+ch);
    g.addColorStop(0, rgbStr(sc.day[0])); g.addColorStop(1, rgbStr(sc.day[1]));
    ctx.fillStyle = g; rr(x,y,cw,ch,12);
    ctx.lineWidth=3; ctx.strokeStyle = sel ? '#ffd23f' : 'rgba(0,0,0,.2)';
    ctx.beginPath();
    ctx.moveTo(x+12,y); ctx.arcTo(x+cw,y,x+cw,y+ch,12); ctx.arcTo(x+cw,y+ch,x,y+ch,12);
    ctx.arcTo(x,y+ch,x,y,12); ctx.arcTo(x,y,x+cw,y,12); ctx.closePath(); ctx.stroke();
    drawThemeIcon(sc.id, x+cw/2, y+ch/2+4, 64);
    if (sel) drawCheckBadge(x+cw-16, y+16, 11);
    uiButtons.push({x,y,w:cw,h:ch, action:()=>{ endlessTheme=sc.id; saveEndlessTheme(); Sound.score(); }});
  });

  button(px+pw/2-75, py+ph-50, 150, 40, 'Back', '#9b7bff','#fff', ()=>{ state=STATE.MENU; }, 'back');
}

function drawOver(){
  const pw=300, ph=304, px=(W-pw)/2, py=H*0.22;
  panel(px,py,pw,ph);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ff5a5a'; ctx.font='bold 38px Mali';
  ctx.fillText('Game Over', W/2, py+40);

  ctx.fillStyle='#666'; ctx.font='16px Mali';
  ctx.fillText(playMode==='levels' ? 'Level '+level+' (goal '+LEVEL_GOAL+')' : 'Score', W/2, py+82);
  ctx.fillStyle='#333'; ctx.font='bold 48px Mali';
  ctx.fillText(score, W/2, py+118);

  if (playMode === 'levels') {
    ctx.fillStyle = '#4a90d9';
    const unlockLine = 'Unlocked: '+unlockedLevel+'/'+MAX_LEVEL;
    fitFont(unlockLine, pw-30, 15, false);
    ctx.fillText(unlockLine, W/2, py+154);
  } else {
    ctx.fillStyle = newRecord ? '#ff9f1c' : '#888';
    const recordLine = newRecord ? 'New Best!' : 'Best: '+best;
    fitFont(recordLine, pw-30, 15, newRecord);
    ctx.fillText(recordLine, W/2, py+154);
  }

  coinLabel('This run '+coinCount+'   /   Total '+wallet, W/2, py+182, 15, false, '#b8860b');

  if (frame-overFrame>25){
    const bw=pw-90;
    button(px+45, py+202, bw, 42, 'Play Again', '#7ad24f','#fff', ()=>reset(), 'retry');
    const hw=(bw-10)/2;
    button(px+45,       py+252, hw, 36, 'Shop', '#4a90d9','#fff', ()=>{ state=STATE.SHOP; }, 'shop');
    if (playMode === 'levels')
      button(px+55+hw, py+252, hw, 36, 'Level', '#9b7bff','#fff', ()=>{ state=STATE.LEVELS; }, 'levels');
    else
      button(px+55+hw, py+252, hw, 36, 'Menu', '#9b7bff','#fff', ()=>{ state=STATE.MENU; }, 'menu');
  }
}

function drawWin(){
  const pw=300, ph=296, px=(W-pw)/2, py=H*0.22;
  panel(px,py,pw,ph);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ffb800'; ctx.font='bold 28px Mali';
  ctx.fillText('All '+MAX_LEVEL+' Levels Cleared!', W/2, py+42);

  ctx.fillStyle='#666'; ctx.font='16px Mali';
  ctx.fillText('You are an ace pilot!', W/2, py+86);

  ctx.fillStyle='#ff9f1c'; ctx.font='bold 17px Mali';
  ctx.fillText('All levels unlocked', W/2, py+122);

  coinLabel('This run '+coinCount+'   /   Total '+wallet, W/2, py+156, 15, false, '#b8860b');

  if (frame-overFrame>25){
    const bw=pw-90;
    button(px+45, py+178, bw, 42, 'Replay Level 1', '#7ad24f','#fff', ()=>startLevel(1), 'retry');
    const hw=(bw-10)/2;
    button(px+45,       py+228, hw, 36, 'Shop', '#4a90d9','#fff', ()=>{ state=STATE.SHOP; }, 'shop');
    button(px+55+hw,    py+228, hw, 36, 'Level', '#9b7bff','#fff', ()=>{ state=STATE.LEVELS; }, 'levels');
  }
}

function drawLevelClear(){
  const pw=300, ph=296, px=(W-pw)/2, py=H*0.22;
  panel(px,py,pw,ph);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#5fae37'; ctx.font='bold 28px Mali';
  ctx.fillText('Level '+level+' Cleared!', W/2, py+44);

  ctx.fillStyle='#666'; ctx.font='16px Mali';
  ctx.fillText('Score', W/2, py+90);
  ctx.fillStyle='#333'; ctx.font='bold 44px Mali';
  ctx.fillText(score, W/2, py+126);

  coinLabel('This run '+coinCount+'   /   Total '+wallet, W/2, py+160, 15, false, '#b8860b');

  if (frame-overFrame>25){
    const bw=pw-90;
    button(px+45, py+182, bw, 42, 'Level '+(level+1), '#7ad24f','#fff', ()=>startLevel(level+1), 'play');
    const hw=(bw-10)/2;
    button(px+45,       py+232, hw, 36, 'Shop', '#4a90d9','#fff', ()=>{ state=STATE.SHOP; }, 'shop');
    button(px+55+hw,    py+232, hw, 36, 'Level', '#9b7bff','#fff', ()=>{ state=STATE.LEVELS; }, 'levels');
  }
}

function drawLevels(){
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,W,H);
  const pw=320, ph=520, px=(W-pw)/2, py=70;
  panel(px,py,pw,ph);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ff7b3a'; ctx.font='bold 26px Mali';
  ctx.fillText('Select Level', W/2, py+32);
  ctx.fillStyle='#888'; ctx.font='13px Mali';
  ctx.fillText('Clear a level to unlock the next', W/2, py+58);

  const tileH=58, gap=14, gx=px+30, gw=pw-60, gy0=py+82;
  for (let i=1;i<=MAX_LEVEL;i++){
    const y = gy0 + (i-1)*(tileH+gap);
    const unlocked = i <= unlockedLevel;
    const cleared  = i < unlockedLevel;
    ctx.fillStyle = cleared ? '#eafff0' : (unlocked ? '#fff7da' : '#eee');
    rr(gx,y,gw,tileH,12);
    ctx.lineWidth=3; ctx.strokeStyle = cleared ? '#5fae37' : (unlocked ? '#ffb800' : '#ccc');
    ctx.beginPath();
    ctx.moveTo(gx+12,y); ctx.arcTo(gx+gw,y,gx+gw,y+tileH,12); ctx.arcTo(gx+gw,y+tileH,gx,y+tileH,12);
    ctx.arcTo(gx,y+tileH,gx,y,12); ctx.arcTo(gx,y,gx+gw,y,12); ctx.closePath(); ctx.stroke();

    ctx.textAlign='left'; ctx.fillStyle = unlocked ? '#333' : '#999';
    ctx.font='bold 20px Mali';
    ctx.fillText('Level '+i, gx+20, y+tileH/2);

    ctx.textAlign='right';
    if (!unlocked){
      drawIcon('lock', gx+gw-26, y+tileH/2, 20, '#bbb');
    } else if (cleared){
      ctx.fillStyle='#5fae37'; ctx.font='bold 16px Mali'; ctx.fillText('Cleared', gx+gw-18, y+tileH/2);
    } else {
      ctx.fillStyle='#ff9f1c'; ctx.font='bold 16px Mali'; ctx.fillText('Play', gx+gw-18, y+tileH/2);
    }

    uiButtons.push({x:gx,y,w:gw,h:tileH, action:()=>{
      if (unlocked) startLevel(i); else Sound.hit();
    }});
  }

  button(px+pw/2-75, py+ph-50, 150, 40, 'Back', '#9b7bff','#fff', ()=>{ state=STATE.MENU; }, 'back');
}

function drawShop(){
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,W,H);
  const pw=350, ph=648, px=(W-pw)/2, py=34;
  panel(px,py,pw,ph);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ff7b3a'; ctx.font='bold 27px Mali';
  ctx.fillText('Bird Shop', W/2, py+28);
  coinLabel('Coins: '+wallet, W/2, py+55, 17, true, '#b8860b');

  const cols=3, cw=98, ch=104, gx0=px+(pw-(cols*cw+(cols-1)*12))/2, gy0=py+78;
  SKINS.forEach((sk,i)=>{
    const col=i%cols, row=(i/cols|0);
    const x=gx0+col*(cw+12), y=gy0+row*(ch+10);
    const owned = owned_ids.includes(sk.id);
    const sel   = sk.id===selectedSkin;
    // tile bg + border (special skins get a purple-gold tint)
    ctx.fillStyle = sel ? '#fff7da' : (sk.fx ? '#f3eeff' : '#f1f1f1');
    rr(x,y,cw,ch,12);
    ctx.lineWidth=3; ctx.strokeStyle = sel ? '#ffb800' : (sk.fx ? '#b89bff' : '#dcdcdc');
    ctx.beginPath();
    ctx.moveTo(x+12,y); ctx.arcTo(x+cw,y,x+cw,y+ch,12); ctx.arcTo(x+cw,y+ch,x,y+ch,12);
    ctx.arcTo(x,y+ch,x,y,12); ctx.arcTo(x,y,x+cw,y,12); ctx.closePath(); ctx.stroke();
    // preview (grey out if locked)
    ctx.save(); ctx.translate(x+cw/2, y+34); ctx.scale(1.1,1.1);
    if (!owned) ctx.globalAlpha=0.45;
    drawBirdSkin(sk, (frame%40<20)?8:0);
    ctx.restore();
    // badges
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    if (sk.fx){ drawIcon('star', x+15, y+14, 14, '#ffd23f'); }
    if (!owned){ drawIcon('lock', x+cw-15, y+14, 16, '#bbb'); }
    // name
    ctx.fillStyle='#444'; ctx.font='bold 13px Mali'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(sk.name, x+cw/2, y+68);
    // status line
    if (sel){ ctx.fillStyle='#5fae37'; ctx.font='bold 13px Mali'; ctx.fillText('Equipped', x+cw/2, y+88); }
    else if (owned){ ctx.fillStyle='#4a90d9'; ctx.font='13px Mali'; ctx.fillText('Tap to equip', x+cw/2, y+88); }
    else { coinLabel(''+sk.price, x+cw/2, y+90, 13, true, wallet>=sk.price?'#b8860b':'#c0392b'); }
    // tile action
    uiButtons.push({x,y,w:cw,h:ch, action:()=>{
      if (owned){ selectedSkin=sk.id; saveSkins(); Sound.score(); }
      else if (wallet>=sk.price){ wallet-=sk.price; owned_ids.push(sk.id); selectedSkin=sk.id; saveWallet(); saveSkins(); Sound.power(); }
      else { Sound.hit(); }   // not enough coins
    }});
  });

  button(px+pw/2-75, py+ph-50, 150, 40, 'Back', '#9b7bff','#fff', ()=>{ state=STATE.MENU; }, 'back');
}

function drawPauseOverlay(){
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,W,PLAYFIELD);
  ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 40px Mali';
  ctx.fillText('Paused', W/2, PLAYFIELD/2);
  ctx.font='16px Mali';
  ctx.fillText('Tap or press P to resume', W/2, PLAYFIELD/2+40);
}

/* ----------------------------- Main loop --------------------------------- */
function render(){
  uiButtons = [];
  ctx.save();
  if(shake>0.5) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake*0.6);
  drawBackground();
  if (playMode === 'levels') { for (const h of hazards) drawHazard(h); }
  else                       { for (const p of pipes) drawPipe(p); }
  for (const c of coins) if(!c.taken) drawCoin(c);
  for (const pu of powerups) if(!pu.taken) drawPowerup(pu);
  drawParticles();
  if (state !== STATE.MENU && state !== STATE.SHOP && state !== STATE.LEVELS && state !== STATE.THEMES) drawBird();
  drawGround();

  if (state === STATE.MENU)        drawMenu();
  else if (state === STATE.SHOP)   drawShop();
  else if (state === STATE.LEVELS) drawLevels();
  else if (state === STATE.THEMES) drawThemes();
  else                             drawHUD();
  if (state === STATE.OVER)       drawOver();
  if (state === STATE.WIN)        drawWin();
  if (state === STATE.LEVELCLEAR) drawLevelClear();
  if (state === STATE.PAUSE)      drawPauseOverlay();
  if(flashAlpha>0.01){ ctx.globalAlpha=flashAlpha; ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
  ctx.restore();
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

/* Fit canvas crisply to device while keeping 400x700 logical size */
function fit(){
  const ratio = W/H;
  let w = window.innerWidth, h = window.innerHeight;
  if (w/h > ratio) w = h*ratio; else h = w/ratio;
  cv.style.width = Math.floor(w)+'px';
  cv.style.height= Math.floor(h)+'px';
}
window.addEventListener('resize', fit);
fit();
// kick the embedded Mali font to load so canvas picks it up from the first frames
if (document.fonts && document.fonts.load) {
  document.fonts.load('700 40px Mali');
  document.fonts.load('500 20px Mali');
}
loop();
</script>
