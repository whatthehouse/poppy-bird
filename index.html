const Sound = {
  ctx: null, muted: false, flapBuf: null,
  master: null, sfx: null,
  init() {
    if (!this.ctx) {
      try {
        this.ctx = new (window.AudioContext||window.webkitAudioContext)();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.85;          // single overall level for all SFX
        this.master.connect(this.ctx.destination);
        // synth SFX bus (everything except the recorded pop) boosted 1.5x
        this.sfx = this.ctx.createGain();
        this.sfx.gain.value = 1.5;
        this.sfx.connect(this.master);
      } catch(e){}
    }
    // decode the recorded mouth-pop (embedded as base64) once, for the flap sound
    if (this.ctx && !this.flapBuf && typeof FLAP_WAV_B64 === 'string' && FLAP_WAV_B64.length) {
      try {
        const bin = atob(FLAP_WAV_B64);
        const bytes = new Uint8Array(bin.length);
        for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
        this.ctx.decodeAudioData(bytes.buffer, (buf)=>{ this.flapBuf = buf; }, ()=>{});
      } catch(e){}
    }
  },
  tone(freq, dur, type='square', vol=0.15, slideTo=null) {
    if (this.muted || !this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(this.sfx || this.master || this.ctx.destination);
    o.start(t); o.stop(t + dur);
  },
  // scheduled note (for jingles) with a soft attack, routed through master
  note(freq, dur, type='triangle', vol=0.2, delay=0) {
    if (this.muted || !this.ctx) return;
    const t = this.ctx.currentTime + delay;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(this.sfx || this.master || this.ctx.destination);
    o.start(t); o.stop(t + dur + 0.02);
  },
  playBuf(buf, vol=1) {
    if (this.muted || !this.ctx || !buf) return;
    const src = this.ctx.createBufferSource();
    const g = this.ctx.createGain();
    g.gain.value = vol;
    src.buffer = buf; src.connect(g); g.connect(this.master || this.ctx.destination);
    src.start();
  },
  // ---- balanced SFX (levels tuned so all sit at a similar loudness) ----
  // recorded mouth-pop (peak 0.89/rms 0.19) played quieter to match the synth blips
  flap()    { if (this.flapBuf) this.playBuf(this.flapBuf, 0.6); else this.tone(420, 0.12, 'square', 0.14, 620); },
  score()   { this.tone(660, 0.10, 'square', 0.15, 990); },
  coin()    { this.tone(880, 0.07, 'square', 0.14, 1320); setTimeout(()=>this.tone(1180,0.08,'square',0.12),60); },
  power()   { this.note(523,0.10,'triangle',0.22,0); this.note(784,0.12,'triangle',0.20,0.09); },
  hit()     { this.tone(200, 0.25, 'sawtooth', 0.16, 60); },
  die()     { this.tone(380, 0.5,  'sawtooth', 0.15, 90); },
  // short victory fanfare for reaching the finish line (C5 E5 G5 C6 + sparkle)
  win() {
    this.note(523.25, 0.16, 'triangle', 0.22, 0.00);
    this.note(659.25, 0.16, 'triangle', 0.22, 0.13);
    this.note(783.99, 0.16, 'triangle', 0.22, 0.26);
    this.note(1046.5, 0.45, 'triangle', 0.24, 0.40);
    this.note(1046.5, 0.45, 'square',   0.07, 0.40);   // subtle body layer
    this.note(1318.5, 0.55, 'triangle', 0.16, 0.60);   // sparkle on top
  }
};

/* Generic bird drawer at local origin (0,0) for any skin */
function drawBirdSkin(sk, flapTimer){
  let body = sk.body, shade = sk.shade, wing = sk.wing;
  if (sk.fx === 'rainbow'){               // cycle the whole bird through the spectrum
    const h = (frame*6) % 360;
    body  = 'hsl('+h+',85%,62%)';
    shade = 'hsl('+h+',85%,48%)';
    wing  = 'hsl('+((h+40)%360)+',90%,78%)';
  }
  // body: radial gradient (light upper-left, dark lower-right) for a glossy 3D-ball look
  const bodyGrad = ctx.createRadialGradient(-6,-6,2, 0,0,22);
  bodyGrad.addColorStop(0, lightenColor(body, 0.45));
  bodyGrad.addColorStop(0.6, body);
  bodyGrad.addColorStop(1, shade);
  ctx.fillStyle = bodyGrad; ctx.beginPath(); ctx.ellipse(0,0,19,17,0,0,Math.PI*2); ctx.fill();
  // rim shadow on the lower-right edge for extra depth
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0,0,19,17,0,0,Math.PI*2); ctx.clip();
  ctx.fillStyle = 'rgba(0,0,0,.18)';
  ctx.beginPath(); ctx.ellipse(5,6,15,12,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.fillStyle = wing;  ctx.beginPath();
  ctx.ellipse(-4, flapTimer>4?-6:6, 9, 6, flapTimer>4?-0.6:0.4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff6d0'; ctx.beginPath(); ctx.ellipse(-2,7,8,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(8,-5,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(10,-5,3.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(11,-6,1.2,0,Math.PI*2); ctx.fill();
  const beakGrad = ctx.createLinearGradient(15,-1,26,4);
  beakGrad.addColorStop(0, lightenColor(sk.beak, 0.3));
  beakGrad.addColorStop(1, sk.beak);
  ctx.fillStyle = beakGrad; ctx.beginPath();
  ctx.moveTo(15,-1); ctx.lineTo(26,2); ctx.lineTo(15,6); ctx.closePath(); ctx.fill();
}
function lightenColor(c, amt){
  if (c.startsWith('hsl')) return c; // skip animated hsl() colors, already dynamic
  const n = parseInt(c.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  r=Math.min(255,Math.round(r+(255-r)*amt));
  g=Math.min(255,Math.round(g+(255-g)*amt));
  b=Math.min(255,Math.round(b+(255-b)*amt));
  return 'rgb('+r+','+g+','+b+')';
}

/* Difficulty (rises with score) */
function diff() {
  const s = score;
  if (playMode === 'levels') {
    // each level continues the difficulty curve where the previous one left
    // off, so level 2 starts harder than level 1 did, and so on
    const eff = s + (level-1) * LEVEL_GOAL;
    return {
      speed:  2.4 + Math.min(eff * 0.0075, 3.8),   // 2.4 -> 6.2 by effective 500
      gap:    Math.max(215 - eff * 0.18,  125),     // 215 -> 125
      every:  Math.max(95  - eff * 0.07,  60)       // spawn spacing (frames)
    };
  }
  // endless: keeps getting harder gradually over a wide score range
  return {
    speed:  2.6 + Math.min(s * 0.035, 4.6),    // rises until ~score 130 (cap 7.2)
    gap:    Math.max(215 - s * 1.7, 112),       // shrinks until ~score 60
    every:  Math.max(95  - s * 0.7, 54)         // obstacles get closer until ~score 58
  };
}

/* Power-up definitions */
const POWERS = {
  shield: { color:'#46e0c8', glyph:'🛡️', dur:360, label:'Shield' },
  slow:   { color:'#9b7bff', glyph:'🐌', dur:360, label:'Slow-mo' },
  magnet: { color:'#ff7bd0', glyph:'🧲', dur:420, label:'Magnet' },
  x2:     { color:'#ffd23f', glyph:'✨', dur:420, label:'2x Score' }
};
const POWER_KEYS = Object.keys(POWERS);
let active = {}; // type -> frames remaining

function powerActive(t){ return (active[t]||0) > 0; }

/* ----------------------------- Spawning ---------------------------------- */
let sincePipe = 0, pipesSpawned = 0, nextSpacing = 0;
// randomized horizontal distance until the next obstacle (0.7x – 1.4x the base)
function nextObstacleSpacing(){ const d = diff(); return d.every * d.speed * (0.7 + Math.random()*0.7); }

function spawnPipe() {
  const d = diff();
  const margin = 70;
  // randomize each pipe's gap width (some wide, some narrow), with a safe floor
  const gap = Math.max(125, d.gap * (0.8 + Math.random()*0.6));   // ~0.8x – 1.4x
  const top = margin + Math.random() * (PLAYFIELD - gap - margin*2);
  const w = 64;
  pipes.push({ x: W + w, top, gap, w, scored:false, seed: Math.random()*1000 });
  pipesSpawned++;

  // Coins: arc inside the gap sometimes
  if (Math.random() < 0.7) {
    const cy = top + gap/2;
    const n = 3;
    for (let i=0;i<n;i++){
      coins.push({ x: W + w + 40 + i*26, y: cy + Math.sin(i)*0 - 26 + i*26, r:10, taken:false });
    }
  }
  // (endless mode has no power-ups — only the level mode spawns them)
}

/* Level mode hazards. 2 kinds, picked 50/50:
   - anchored : rooted to ground/ceiling (fly over/under it)
   - floating : drifts in mid-air (dodge around it)                          */
function spawnHazard() {
  pipesSpawned++;
  const r = 20 + level*3 + Math.random()*22;    // wider random size spread

  // per-hazard look: hue shift (mostly subtle, sometimes a rare odd variety),
  // plus saturation/brightness jitter so each one feels like a different breed
  const hue    = (Math.random() < 0.15) ? (Math.random()*90 - 45) : (Math.random()*40 - 20);
  const sat    = 0.8 + Math.random()*0.5;
  const bright = 0.88 + Math.random()*0.3;

  // place coins (and a power-up every 5th obstacle) in the free zone at openY
  const placePickups = (x0, openY) => {
    if (Math.random() < 0.7) {
      const cy = Math.max(40, Math.min(PLAYFIELD-40, openY));
      for (let i=0;i<3;i++) coins.push({ x: x0 + 40 + i*26, y: cy, r:10, taken:false });
    }
    if (pipesSpawned % 5 === 0) {
      const ptype = POWER_KEYS[Math.floor(Math.random()*POWER_KEYS.length)];  // random power-up
      const puY = Math.max(40, Math.min(PLAYFIELD-40, openY));
      powerups.push({ x: x0 + 30, y: puY, r:18, type: ptype, taken:false, bob: Math.random()*Math.PI*2 });
    }
  };

  if (Math.random() < 0.5) {
    // ---- anchored ----
    const side = Math.random() < 0.5 ? 'bottom' : 'top';
    // wide spread: some short stubs, some tall columns (upper bound rises by level)
    const lo = r*1.2;
    const hi = Math.min(PLAYFIELD*0.62, r*1.2 + 120 + level*16);
    const height = lo + Math.random()*(hi - lo);
    const tipY = side==='bottom' ? PLAYFIELD - height : height;
    hazards.push({ kind:'anchored', side, height, tipY, x: W + r, r, scored:false, seed: Math.random()*1000, hue, sat, bright });
    const openY = side==='bottom' ? tipY - 55 : tipY + 55;   // gap above/below the obstacle
    placePickups(W + r, openY);
  } else {
    // ---- floating ----
    const margin = r + 55;
    const hy = margin + Math.random() * (PLAYFIELD - margin*2);
    const bobAmp = Math.max(0, level-2) * 10 + Math.random()*4;   // levels 1-2 sit still
    const bobSpeed = 0.025 + Math.random()*0.02;
    hazards.push({ kind:'floating', x: W + r, y: hy, r, bob: Math.random()*Math.PI*2, bobAmp, bobSpeed, scored:false, seed: Math.random()*1000, hue, sat, bright });
    const clear = bobAmp + r + 50;
    placePickups(W + r, hy + (Math.random()<0.5?-1:1) * clear);
  }
}

/* Collision test for a level hazard against the bird */
function hitsHazard(h){
  if (h.kind === 'anchored') {
    // solid vertical column from its edge to tipY, width 2r (pipe-like AABB)
    if (bird.x + bird.r > h.x - h.r && bird.x - bird.r < h.x + h.r) {
      return h.side === 'bottom' ? (bird.y + bird.r > h.tipY)
                                 : (bird.y - bird.r < h.tipY);
    }
    return false;
  }
  const hy = h.y + Math.sin(h.bob)*h.bobAmp;
  return Math.hypot(bird.x-h.x, bird.y-hy) < bird.r + h.r;
}

/* ----------------------------- Particles --------------------------------- */
function burst(x,y,color,count,spd=3){
  for(let i=0;i<count;i++){
    const a = Math.random()*Math.PI*2;
    const s = Math.random()*spd+1;
    particles.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:30, max:30, color, size:Math.random()*4+2 });
  }
}

/* Trailing glow behind the bird for special (fx) skins, only while flying */
function emitTrail(){
  const sk = currentSkin();
  if (!sk.fx) return;
  const bx = bird.x - 13, by = bird.y + 4;
  if (sk.fx === 'fire'){
    for (let i=0;i<2;i++)
      particles.push({ x:bx+(Math.random()*6-3), y:by, vx:-1-Math.random(), vy:-0.4-Math.random(),
        life:22, max:22, color: Math.random()<0.5?'#ff7b3a':'#ffd23f', size:Math.random()*4+3 });
  } else if (sk.fx === 'rainbow'){
    particles.push({ x:bx, y:by, vx:-1.6, vy:0, life:26, max:26,
      color:'hsl('+((frame*8)%360)+',90%,60%)', size:5 });
  } else if (sk.fx === 'ice'){
    if (frame%2===0)
      particles.push({ x:bx, y:by+(Math.random()*8-4), vx:-1, vy:0.3, life:28, max:28,
        color: Math.random()<0.5?'#bfe8ff':'#ffffff', size:Math.random()*3+2 });
  } else if (sk.fx === 'star'){
    if (frame%3===0)
      particles.push({ x:bx, y:by+(Math.random()*10-5), vx:-1.2, vy:0, life:32, max:32,
        color: Math.random()<0.5?'#ffd23f':'#c4b3ff', size:Math.random()*3+2 });
  }
}

/* ----------------------------- Input ------------------------------------- */
let uiButtons = [];   // rebuilt every frame by the UI draw fns; {x,y,w,h,action}
function inRect(p,b){ return p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h; }
function getPos(e){
  const rect = cv.getBoundingClientRect();
  const src = (e.touches && e.touches[0]) ? e.touches[0] : e;
  return { x:(src.clientX-rect.left)*(W/rect.width), y:(src.clientY-rect.top)*(H/rect.height) };
}

function flap() {
  if (state !== STATE.PLAY) return;
  bird.vy = FLAP_V; bird.flapTimer = 8;
  Sound.flap();
  burst(bird.x-8, bird.y+6, 'rgba(255,255,255,.8)', 4, 2);
}

function onPress(pos){
  Sound.init();
  if (Sound.ctx && Sound.ctx.state === 'suspended') Sound.ctx.resume();
  // on-screen buttons (menu / shop / game-over) take priority
  for (const b of uiButtons){ if (inRect(pos,b)){ b.action(); return; } }
  if (state === STATE.PLAY)  { flap(); return; }
  if (state === STATE.PAUSE) { state = STATE.PLAY; return; }
  if (state === STATE.OVER && frame - overFrame > 25) { reset(); return; }
  if (state === STATE.WIN  && frame - overFrame > 25) { state = STATE.LEVELS; return; }
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault(); Sound.init();
    if (state === STATE.MENU)       startGame();
    else if (state === STATE.SHOP)  state = STATE.MENU;
    else if (state === STATE.LEVELS) {} // pick a level by tapping its tile
    else if (state === STATE.THEMES) {} // pick a theme by tapping its tile
    else if (state === STATE.PLAY)  flap();
    else if (state === STATE.PAUSE) state = STATE.PLAY;
    else if (state === STATE.OVER && frame - overFrame > 25) reset();
    else if (state === STATE.WIN  && frame - overFrame > 25) state = STATE.LEVELS;
    else if (state === STATE.LEVELCLEAR && frame - overFrame > 25) startLevel(Math.min(level+1, MAX_LEVEL));
  }
  else if (e.key === 'p' || e.key === 'P') { if(state===STATE.PLAY) state=STATE.PAUSE; else if(state===STATE.PAUSE) state=STATE.PLAY; }
  else if (e.key === 'm' || e.key === 'M') { Sound.muted = !Sound.muted; }
});
// listen on the whole window (not just the canvas) so taps in the letterbox
// margins around the canvas still register as a flap
let lastTouchAt = 0;
window.addEventListener('touchstart', e => {
  e.preventDefault();
  lastTouchAt = Date.now();
  onPress(getPos(e));
}, {passive:false});
window.addEventListener('mousedown', e => {
  if (Date.now() - lastTouchAt < 700) return;   // ignore the synthetic click fired after a touch
  onPress(getPos(e));
});

/* ----------------------------- Lifecycle --------------------------------- */
let overFrame = 0;
function startGame(){ reset(); state = STATE.PLAY; }
function reset() {
  state = STATE.PLAY;
  pipes = []; hazards = []; coins = []; powerups = []; particles = [];
  active = {};
  bird.y = H*0.45; bird.vy = 0; bird.rot = 0;
  score = 0; coinCount = 0; frame = 0; sincePipe = 0; pipesSpawned = 0;
  shake=0; flashAlpha=0; scoreAnim=0; nearMissTimer=0; combo=0; comboTimer=0;
  nextSpacing = nextObstacleSpacing();
  const idx = (playMode === 'levels') ? levelSceneIndex(level) : endlessSceneIndex();
  sceneT = idx; sceneToastIdx = idx; sceneToastTimer = 110;
}
function gameOver() {
  if (state === STATE.OVER) return;
  state = STATE.OVER;
  overFrame = frame;
  Sound.hit(); setTimeout(()=>Sound.die(), 120);
  burst(bird.x, bird.y, '#ffb03a', 22, 5);
  shake=14; flashAlpha=0.75;
  if (playMode === 'levels') {
    newRecord = false;
  } else {
    newRecord = score > best;
    if (newRecord) { best = score; localStorage.setItem(STORE, best); }
  }
}
function winGame() {
  if (state === STATE.WIN) return;
  state = STATE.WIN;
  overFrame = frame;
  Sound.win();
  burst(bird.x, bird.y, '#ffd23f', 30, 6);
  newRecord = false;
}
function levelClear() {
  if (state === STATE.LEVELCLEAR || state === STATE.WIN) return;
  if (level === unlockedLevel && unlockedLevel < MAX_LEVEL) { unlockedLevel++; saveUnlocked(); }
  if (level >= MAX_LEVEL) { winGame(); return; }
  state = STATE.LEVELCLEAR;
  overFrame = frame;
  Sound.win();
  burst(bird.x, bird.y, '#ffd23f', 24, 5);
}
let newRecord = false;

/* ----------------------------- Update ------------------------------------ */
function update() {
  frame++;
  dayPhase = (Math.sin(frame/1400) * 0.5 + 0.5); // slow day/night

  // scene is fixed per run in both modes now (level → its theme, endless → the
  // user-chosen theme; both set in reset()). Day/night still cycles via dayPhase.
  if (sceneToastTimer > 0) sceneToastTimer--;

  if (state === STATE.PLAY) {
    const d = diff();
    const slowF = powerActive('slow') ? 0.55 : 1;     // slow-mo affects world speed
    const sp = d.speed * slowF;
    scrollX = (scrollX + sp) % 48;

    // bird physics
    bird.vy += GRAVITY;
    bird.y  += bird.vy;
    bird.rot = Math.max(-0.5, Math.min(1.4, bird.vy * 0.08));
    if (bird.flapTimer>0) bird.flapTimer--;
    emitTrail();

    // ceiling / ground
    if (bird.y - bird.r < 0) { bird.y = bird.r; bird.vy = 0; }
    if (bird.y + bird.r > PLAYFIELD) { bird.y = PLAYFIELD - bird.r; gameOver(); }

    // spawn obstacles by DISTANCE travelled (not frame count) so horizontal
    // spacing stays constant even while slow-mo reduces the scroll speed
    sincePipe += sp;
    if (sincePipe >= nextSpacing) {
      sincePipe = 0;
      (playMode==='levels') ? spawnHazard() : spawnPipe();
      nextSpacing = nextObstacleSpacing();   // randomize distance to the next one
    }

    if (playMode === 'levels') {
      // ---- level mode: dodge anchored + floating hazards (no pipes) ----
      for (const h of hazards) {
        h.x -= sp;
        if (h.kind === 'floating') h.bob += h.bobSpeed;
        if (!h.scored && h.x + h.r < bird.x) {
          h.scored = true;
          score += powerActive('x2') ? 2 : 1;
          Sound.score();
          scoreAnim=12; combo++; comboTimer=90;
          burst(bird.x, bird.y, 'rgba(255,255,180,.7)', 5, 2.5);
        }
      }
      hazards = hazards.filter(h => h.x + h.r > -40);

      if (score >= LEVEL_GOAL) levelClear();

      for (const h of hazards) {
        if (!hitsHazard(h)) continue;
        if (powerActive('shield')) { if (frame%3===0) burst(bird.x, bird.y, POWERS.shield.color, 3, 3); }
        else { gameOver(); break; }
      }
    } else {
      // ---- classic/endless mode: fly through pipe gaps ----
      for (const p of pipes) {
        p.x -= sp;
        if (!p.scored && p.x + p.w < bird.x) {
          p.scored = true;
          score += powerActive('x2') ? 2 : 1;
          Sound.score();
          scoreAnim=12; combo++; comboTimer=90;
          burst(bird.x, bird.y, 'rgba(255,255,180,.7)', 6, 2.5);
          const _dt=bird.y-bird.r-p.top, _db=(p.top+p.gap)-(bird.y+bird.r);
          if(Math.min(_dt,_db)<NEAR_DIST){ nearMissTimer=80; nearMissY=bird.y; wallet++; coinCount++; saveWallet(); burst(bird.x,bird.y,'#ffd23f',10,4); }
        }
      }
      pipes = pipes.filter(p => p.x + p.w > -10);

      if (!powerActive('shield')) {
        for (const p of pipes) {
          if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + p.w) {
            if (bird.y - bird.r < p.top || bird.y + bird.r > p.top + p.gap) {
              gameOver(); break;
            }
          }
        }
      } else {
        // shield smashes through pipes it touches
        for (const p of pipes) {
          if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + p.w &&
              (bird.y - bird.r < p.top || bird.y + bird.r > p.top + p.gap)) {
            // no death; sparkle
            if (frame%3===0) burst(bird.x, bird.y, POWERS.shield.color, 3, 3);
          }
        }
      }
    }

    // coins
    const mag = powerActive('magnet');
    for (const c of coins) {
      c.x -= sp;
      if (c.taken) continue;
      if (mag) {
        const dx = bird.x - c.x, dy = bird.y - c.y;
        const dist = Math.hypot(dx,dy);
        if (dist < 150) { c.x += dx/dist*4.5; c.y += dy/dist*4.5; }
      }
      if (Math.hypot(bird.x-c.x, bird.y-c.y) < bird.r + c.r) {
        c.taken = true;
        const coinGain = powerActive('x2') ? 2 : 1;
        coinCount += coinGain; wallet += coinGain; saveWallet();
        Sound.coin(); burst(c.x, c.y, '#ffd23f', 8, 3);
      }
    }
    coins = coins.filter(c => !c.taken && c.x > -20);

    // power-ups
    for (const pu of powerups) {
      pu.x -= sp; pu.bob += 0.1;
      if (pu.taken) continue;
      if (Math.hypot(bird.x-pu.x, bird.y-(pu.y+Math.sin(pu.bob)*5)) < bird.r + pu.r) {
        pu.taken = true;
        active[pu.type] = POWERS[pu.type].dur;
        Sound.power(); burst(pu.x, pu.y, POWERS[pu.type].color, 16, 4);
      }
    }
    powerups = powerups.filter(pu => !pu.taken && pu.x > -30);

    // tick power-ups
    for (const k in active) { if (active[k]>0) active[k]--; }
  }

  // particles always update
  for (const pt of particles) {
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.12; pt.life--;
  }
  particles = particles.filter(pt => pt.life > 0);
  // juice ticks (continue during game-over animation)
  if(scoreAnim>0) scoreAnim--;
  if(comboTimer>0){ comboTimer--; if(comboTimer===0) combo=0; }
  if(nearMissTimer>0) nearMissTimer--;
  if(shake>0.4) shake*=0.8; else shake=0;
  if(flashAlpha>0.01) flashAlpha*=0.85; else flashAlpha=0;
}

/* ----------------------------- Drawing ----------------------------------- */
function lerp(a,b,t){ return a+(b-a)*t; }
function mixArr(c1,c2,t){ return [lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t)]; }
function rgbStr(c){ return `rgb(${Math.round(c[0])},${Math.round(c[1])},${Math.round(c[2])})`; }
function mix(c1,c2,t){ return rgbStr(mixArr(c1,c2,t)); }

let sceneBlend = { low: SCENES[0], high: SCENES[0], blend: 0 };

function drawBackground() {
  const t = dayPhase;
  const lowIdx = Math.max(0, Math.floor(sceneT));
  const hiIdx  = Math.min(SCENES.length-1, lowIdx+1);
  const blend  = sceneT - lowIdx;
  const low = SCENES[lowIdx], high = SCENES[hiIdx];
  sceneBlend.low = low; sceneBlend.high = high; sceneBlend.blend = blend;

  // sky gradient: blend day<->night within each scene, then blend between scenes
  const top = mixArr(mixArr(low.day[0],low.night[0],t), mixArr(high.day[0],high.night[0],t), blend);
  const bot = mixArr(mixArr(low.day[1],low.night[1],t), mixArr(high.day[1],high.night[1],t), blend);
  const g = ctx.createLinearGradient(0,0,0,PLAYFIELD);
  g.addColorStop(0, rgbStr(top));
  g.addColorStop(1, rgbStr(bot));
  ctx.fillStyle = g; ctx.fillRect(0,0,W,PLAYFIELD);

  // (sun/moon removed — the sky still shifts through morning/day/dusk/night)

  // scene-specific decor, cross-faded between the outgoing and incoming scene
  drawSceneDecor(low,  t, 1 - blend);
  if (hiIdx !== lowIdx) drawSceneDecor(high, t, blend);

  // ground colors for drawGround() to pick up
  sceneColors.groundTop  = mixArr(low.groundTop,  high.groundTop,  blend);
  sceneColors.groundPath = mixArr(low.groundPath, high.groundPath, blend);
  sceneColors.edge       = mixArr(low.edge,       high.edge,       blend);
  sceneColors.edge2      = mixArr(low.edge2,      high.edge2,      blend);
}

function drawSceneDecor(sc, t, alpha){
  if (alpha <= 0.01) return;
  ctx.globalAlpha = alpha;
  if (sc.id === 'meadow') {
    ctx.fillStyle = 'rgba(255,255,255,'+(0.85-0.5*t)+')';
    for (let i=0;i<4;i++){
      const cxp = ((i*150 - frame*0.4) % (W+160)) - 80;
      const cyp = 80 + (i%2)*70 + i*30;
      cloud(cxp, cyp, 1+(i%2)*0.3);
    }
    ctx.fillStyle = mix([126,214,122],[60,90,70],t);
    hill(frame*0.3, PLAYFIELD-40, 120, 60);
    ctx.fillStyle = mix([150,224,140],[80,110,90],t);
    hill(frame*0.5+200, PLAYFIELD-20, 90, 40);
  } else if (sc.id === 'desert') {
    ctx.fillStyle = 'rgba(255,235,200,'+(0.5-0.3*t)+')';
    for (let i=0;i<3;i++) cloud(((i*200 - frame*0.3) % (W+200)) - 100, 60+i*20, 1.4);
    ctx.fillStyle = mix([214,160,90],[110,70,60],t);
    hill(frame*0.25, PLAYFIELD-30, 100, 90);
    ctx.fillStyle = mix([232,186,120],[140,95,75],t);
    hill(frame*0.4+150, PLAYFIELD-12, 70, 70);
    // sparse cactus silhouettes, tiled & scrolling
    ctx.fillStyle = mix([60,90,50],[30,45,30],t);
    const P=140, count=Math.ceil((W+200)/P)+1, spd=frame*0.3;
    for (let k=0;k<count;k++){
      const i = Math.floor(spd/P)+k;
      if (hash(i) < 0.45) continue;
      const x = k*P - (spd%P) - 60, baseY = PLAYFIELD-6, h = 18+hash(i+9)*22;
      ctx.fillRect(x-3, baseY-h, 6, h);
      ctx.fillRect(x-9, baseY-h*0.55, 6, h*0.28);
      ctx.fillRect(x+3, baseY-h*0.7, 6, h*0.22);
    }
  } else if (sc.id === 'ocean') {
    ctx.fillStyle = mix([60,170,190],[20,70,90],t);
    hill(frame*0.35, PLAYFIELD-35, 70, 70);
    ctx.fillStyle = mix([90,200,210],[30,90,110],t);
    hill(frame*0.5+180, PLAYFIELD-16, 50, 55);
    // fish silhouettes swimming across
    ctx.fillStyle = 'rgba(20,60,70,.5)';
    for (let i=0;i<3;i++){
      const fx = (((hash(i+900)*(W+80)) - frame*0.8) % (W+80) + (W+80)) % (W+80) - 40;
      const fy = 60 + hash(i+950)*120;
      fishShape(fx, fy, 14);
    }
    // rising bubbles
    ctx.fillStyle = 'rgba(255,255,255,.55)';
    for (let i=0;i<16;i++){
      const bx = hash(i+600)*W;
      const byY = PLAYFIELD - ((frame*1.1 + hash(i+700)*400) % (PLAYFIELD+40));
      ctx.beginPath(); ctx.arc(bx, byY, 1.5+hash(i+800)*2.5, 0, Math.PI*2); ctx.fill();
    }
  } else if (sc.id === 'volcano') {
    const vx = W*0.74, vBase = PLAYFIELD-30, vTop = vBase-150;
    ctx.fillStyle = mix([60,30,28],[30,14,14],t);
    ctx.beginPath(); ctx.moveTo(vx-70, vBase); ctx.lineTo(vx, vTop); ctx.lineTo(vx+70, vBase); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,120,40,.9)';
    ctx.beginPath(); ctx.arc(vx, vTop+6, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(90,85,90,.45)';
    for (let i=0;i<5;i++){
      const sy = vTop - ((frame*0.6 + hash(i+1000)*120) % 140);
      const sx = vx + Math.sin(frame*0.02+i)*10;
      ctx.beginPath(); ctx.arc(sx, sy, 10+hash(i+1010)*8, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = mix([70,38,34],[30,16,16],t);
    hill(frame*0.25, PLAYFIELD-22, 60, 75);
    // drifting ash
    ctx.fillStyle = 'rgba(50,45,45,.7)';
    for (let i=0;i<18;i++){
      const ax = (((hash(i+1100)*W) - frame*0.5) % W + W) % W;
      const ay = ((frame*0.5 + hash(i+1150)*PLAYFIELD) % PLAYFIELD) * 0.8;
      ctx.beginPath(); ctx.arc(ax, ay, 1+hash(i+1160)*1.8, 0, Math.PI*2); ctx.fill();
    }
  } else if (sc.id === 'arctic') {
    ctx.fillStyle = mix([225,235,245],[150,160,185],t);
    hill(frame*0.3, PLAYFIELD-40, 110, 65);
    ctx.fillStyle = mix([245,250,255],[180,190,210],t);
    hill(frame*0.45+160, PLAYFIELD-18, 80, 50);
    // aurora ribbon, only visible at night
    if (t > 0.5) {
      const a = (t-0.5)*2;
      for (let band=0; band<2; band++){
        ctx.globalAlpha = alpha * a * 0.5;
        ctx.strokeStyle = band===0 ? '#7dffb0' : '#b07dff';
        ctx.lineWidth = 14;
        ctx.beginPath();
        for (let x=0;x<=W;x+=14){
          const yy = 60 + band*22 + Math.sin((x+frame*0.6)/60 + band)*18;
          if (x===0) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = alpha;
    }
    // falling snow
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    for (let i=0;i<24;i++){
      const sx = (((hash(i+500)*W) - frame*0.15) % W + W) % W;
      const sy = (frame*1.4 + hash(i+550)*PLAYFIELD) % PLAYFIELD;
      ctx.beginPath(); ctx.arc(sx, sy, 1+hash(i+560)*1.6, 0, Math.PI*2); ctx.fill();
    }
  } else if (sc.id === 'city') {
    const baseColor = mixArr([150,168,200],[60,60,90],t);
    const P=70, count=Math.ceil((W+200)/P)+1, spd=frame*0.5;
    for (let k=0;k<count;k++){
      const i = Math.floor(spd/P)+k;
      const x = k*P - (spd%P) - 35, h = 60+hash(i)*150, w = 40+hash(i+3)*22;
      const y = PLAYFIELD-20-h;
      ctx.fillStyle = rgbStr(baseColor);
      ctx.fillRect(x-w/2, y, w, h);
      if (t > 0.45) {
        ctx.fillStyle = 'rgba(255,230,140,'+(0.25+0.5*hash(i+1))+')';
        for (let wx=6; wx<w-10; wx+=12)
          for (let wy=8; wy<h-10; wy+=16)
            if (hash(i+wx*3+wy) > 0.5) ctx.fillRect(x-w/2+wx, y+wy, 5, 7);
      }
    }
  } else if (sc.id === 'space') {
    ctx.fillStyle = '#ff9f7a';
    ctx.beginPath(); ctx.arc(W*0.22, 110, 26, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,210,180,.5)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.ellipse(W*0.22, 110, 40, 12, -0.3, 0, Math.PI*2); ctx.stroke();
    for (let i=0;i<40;i++){
      const x = (((hash(i)*W) - frame*0.06) % W + W) % W;
      const y = hash(i+50) * PLAYFIELD * 0.85;
      const tw = 0.5 + 0.5*Math.sin(frame*0.05+i);
      ctx.globalAlpha = alpha * tw;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(x, y, hash(i+20)*1.6+0.6, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}
function fishShape(x,y,s){
  ctx.beginPath();
  ctx.ellipse(x,y,s,s*0.45,0,0,Math.PI*2);
  ctx.moveTo(x-s,y);
  ctx.lineTo(x-s-s*0.6,y-s*0.4);
  ctx.lineTo(x-s-s*0.6,y+s*0.4);
  ctx.closePath();
  ctx.fill();
}
function cloud(x,y,s){
  ctx.beginPath();
  ctx.arc(x,y,22*s,0,Math.PI*2);
  ctx.arc(x+24*s,y+6*s,18*s,0,Math.PI*2);
  ctx.arc(x-24*s,y+6*s,16*s,0,Math.PI*2);
  ctx.arc(x,y+12*s,20*s,0,Math.PI*2);
  ctx.fill();
}
function hill(off,baseY,h,step){
  ctx.beginPath();
  ctx.moveTo(0,PLAYFIELD);
  for(let x=0;x<=W;x+=10){
    const y = baseY - Math.sin((x+off)/step)*h*0.3 - h*0.3;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,PLAYFIELD); ctx.closePath(); ctx.fill();
}

/* Obstacle look follows the current scene, cross-fading during transitions */
function drawPipe(p){
  const { low, high, blend } = sceneBlend;
  drawThemedPipe(p, low, 1 - blend);
  if (high.id !== low.id) drawThemedPipe(p, high, blend);
}

function drawThemedPipe(p, sc, alpha){
  if (alpha <= 0.01) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  const x=p.x, w=p.w, capH=26, capOver=6, top=p.top, by=p.top+p.gap, seed=p.seed;
  if      (sc.id === 'meadow')  drawBambooObstacle(x,w,top,by,capH,capOver);
  else if (sc.id === 'ocean')   drawCoralObstacle(x,w,top,by,seed);
  else if (sc.id === 'desert')  drawRockObstacle(x,w,top,by,seed);
  else if (sc.id === 'volcano') drawLavaRockObstacle(x,w,top,by,seed);
  else if (sc.id === 'arctic')  drawIcicleObstacle(x,w,top,by,seed);
  else if (sc.id === 'city')    drawGirderObstacle(x,w,top,by,capH,capOver);
  else if (sc.id === 'space')   drawAsteroidObstacle(x,w,top,by,seed);
  ctx.restore();
}

/* Level mode hazards. Each theme has 2 kinds:
   - anchored : rooted to the ground or ceiling, bird flies over/under it
   - floating : drifts in mid-air, bird dodges around it
   Both themed for the level's fixed scene, with shading for depth. */
function drawHazard(h){
  const themeId = LEVEL_THEMES[level-1];
  ctx.save();
  // per-hazard colour variety: hue shift + saturation/brightness jitter
  ctx.filter = `hue-rotate(${h.hue||0}deg) saturate(${h.sat||1}) brightness(${h.bright||1})`;
  if (h.kind === 'anchored') {
    if (h.side === 'bottom') { ctx.translate(h.x, PLAYFIELD); ctx.scale(1,-1); }
    else                     { ctx.translate(h.x, 0); }
    // drawer space: y=0 at the edge, +y grows into the field, tip at y=height
    (ANCHORED_DRAWERS[themeId] || ANCHORED_DRAWERS.meadow)(h.r, h.height, h.seed);
  } else {
    const y = h.y + Math.sin(h.bob)*h.bobAmp;
    ctx.translate(h.x, y);
    (FLOATING_DRAWERS[themeId] || FLOATING_DRAWERS.meadow)(h.r, h.seed);
  }
  ctx.restore();
}
const FLOATING_DRAWERS = {
  meadow:  drawBrambleHazard,
  ocean:   drawPufferfishHazard,
  desert:  drawTumbleweedHazard,
  volcano: drawFireballHazard,
  space:   drawAsteroidHazard,
};
const ANCHORED_DRAWERS = {
  meadow:  drawTreeAnchored,
  ocean:   drawCoralAnchored,
  desert:  drawCactusAnchored,
  volcano: drawLavaSpireAnchored,
  space:   drawCrystalAnchored,
};

/* shared helper: build a lumpy/jagged closed path (used for clip + fill) */
function lumpPath(r, lobes, lobeFrac, seed, coreFrac){
  ctx.beginPath();
  ctx.arc(0,0, r*coreFrac, 0, Math.PI*2);
  for (let i=0;i<lobes;i++){
    const a = (i/lobes)*Math.PI*2 + hash(seed+i)*0.6;
    const dist = r*0.5;
    ctx.arc(Math.cos(a)*dist, Math.sin(a)*dist, r*lobeFrac, 0, Math.PI*2);
  }
}
function jaggedPath(r, pts, seed){
  ctx.beginPath();
  for (let i=0;i<=pts;i++){
    const a = (i/pts)*Math.PI*2;
    const rr = r*(0.78+hash(seed+i)*0.3);
    const px = Math.cos(a)*rr, py = Math.sin(a)*rr;
    if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
}

/* 🌳 meadow — lumpy thorned bramble bush, not a smooth ball */
function drawBrambleHazard(r,seed){
  lumpPath(r, 6, 0.4, seed, 0.7);
  const grad = ctx.createRadialGradient(-r*0.35,-r*0.35,r*0.1,0,0,r*1.1);
  grad.addColorStop(0,'#b6f08a'); grad.addColorStop(0.55,'#7ad24f'); grad.addColorStop(1,'#3f7a26');
  ctx.fillStyle = grad; ctx.fill();
  ctx.save(); lumpPath(r,6,0.4,seed,0.7); ctx.clip();
  ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.arc(r*0.3,r*0.3,r*0.9,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#3f7a26';
  for (let i=0;i<6;i++){
    const a = (i/6)*Math.PI*2 + hash(seed+i)*0.6;
    const dist = r*0.5, tipLen = r*0.32;
    ctx.save(); ctx.translate(Math.cos(a)*dist, Math.sin(a)*dist); ctx.rotate(a);
    ctx.beginPath(); ctx.moveTo(0,-3); ctx.lineTo(tipLen,0); ctx.lineTo(0,3); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

/* 🌊 ocean — pufferfish: round body, long spines, tail fin, eye */
function drawPufferfishHazard(r,seed){
  const grad = ctx.createRadialGradient(-r*0.3,-r*0.35,r*0.1,0,0,r*1.05);
  grad.addColorStop(0,'#ffe3ef'); grad.addColorStop(0.55,'#ff8fc0'); grad.addColorStop(1,'#c44f7a');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(0,0,r*0.95,r*0.85,0,0,Math.PI*2); ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0,0,r*0.95,r*0.85,0,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='rgba(0,0,0,.18)';
  ctx.beginPath(); ctx.ellipse(r*0.3,r*0.3,r*0.8,r*0.7,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.strokeStyle='#ff8fc0'; ctx.lineWidth=2.4; ctx.lineCap='round';
  const n=12;
  for (let i=0;i<n;i++){
    const a = (i/n)*Math.PI*2 + hash(seed+i)*0.3;
    const len = r*0.55 + hash(seed+i+5)*r*0.25;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r*0.85, Math.sin(a)*r*0.85);
    ctx.lineTo(Math.cos(a)*(r*0.85+len), Math.sin(a)*(r*0.85+len));
    ctx.stroke();
  }
  ctx.fillStyle = '#ff8fc0';
  ctx.beginPath(); ctx.moveTo(r*0.7,0); ctx.lineTo(r*1.15,-r*0.35); ctx.lineTo(r*1.15,r*0.35); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-r*0.35,-r*0.15,r*0.18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(-r*0.4,-r*0.15,r*0.09,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c44f7a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-r*0.85,r*0.05,r*0.12,0,Math.PI); ctx.stroke();
}

/* 🏜️ desert — tumbleweed: tangle of curved twigs, not a solid rock */
function drawTumbleweedHazard(r,seed){
  const grad = ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.2,0,0,r);
  grad.addColorStop(0,'rgba(224,196,138,.4)'); grad.addColorStop(1,'rgba(150,110,60,.12)');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#9c7a45'; ctx.lineWidth = 2;
  for (let i=0;i<9;i++){
    const a1 = hash(seed+i)*Math.PI*2, a2 = hash(seed+i+20)*Math.PI*2;
    const r1 = r*(0.3+hash(seed+i+30)*0.7), r2 = r*(0.3+hash(seed+i+40)*0.7);
    const cx = (hash(seed+i+50)-0.5)*r*0.6, cy = (hash(seed+i+60)-0.5)*r*0.6;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a1)*r1, Math.sin(a1)*r1);
    ctx.quadraticCurveTo(cx,cy, Math.cos(a2)*r2, Math.sin(a2)*r2);
    ctx.stroke();
  }
  ctx.strokeStyle = '#7a5e34'; ctx.lineWidth = 1.6;
  for (let i=0;i<14;i++){
    const a = (i/14)*Math.PI*2 + hash(seed+i+70)*0.4;
    const len = r*0.18 + hash(seed+i+80)*r*0.12;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r*0.92, Math.sin(a)*r*0.92);
    ctx.lineTo(Math.cos(a)*(r*0.92+len), Math.sin(a)*(r*0.92+len));
    ctx.stroke();
  }
}

/* 🌋 volcano — flying fireball with a streaming flame trail, not a static rock */
function drawFireballHazard(r,seed){
  for (let i=0;i<3;i++){
    const tlen = r*(1.1+i*0.45);
    ctx.fillStyle = i===0?'rgba(255,200,80,.55)':(i===1?'rgba(255,140,40,.45)':'rgba(255,90,30,.3)');
    ctx.beginPath();
    ctx.moveTo(0,-r*0.5+i*r*0.05);
    ctx.quadraticCurveTo(r*0.6+tlen*0.5, 0, tlen, 0);
    ctx.quadraticCurveTo(r*0.6+tlen*0.5, 0, 0, r*0.5-i*r*0.05);
    ctx.closePath(); ctx.fill();
  }
  const grad = ctx.createRadialGradient(-r*0.2,-r*0.2,r*0.1,0,0,r*0.8);
  grad.addColorStop(0,'#fff6c8'); grad.addColorStop(0.4,'#ffb347'); grad.addColorStop(0.8,'#ff5a1f'); grad.addColorStop(1,'#9c2c10');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0,0,r*0.78,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(60,15,5,.6)'; ctx.lineWidth = 2;
  for (let i=0;i<3;i++){
    const a0 = hash(seed+i)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a0)*r*0.15, Math.sin(a0)*r*0.15);
    ctx.lineTo(Math.cos(a0)*r*0.7, Math.sin(a0)*r*0.7);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,200,80,.9)';
  for (let i=0;i<4;i++){
    const a = hash(seed+i+40)*Math.PI*2, rad = r*0.8+hash(seed+i+45)*r*0.5;
    ctx.beginPath(); ctx.arc(Math.cos(a)*rad, Math.sin(a)*rad, 1.6+hash(seed+i)*1.4, 0, Math.PI*2); ctx.fill();
  }
}

/* 🌌 space — jagged irregular asteroid chunk, not a round rock */
function drawAsteroidHazard(r,seed){
  jaggedPath(r, 10, seed);
  const grad = ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r*1.1);
  grad.addColorStop(0,'#cfc2ea'); grad.addColorStop(0.55,'#8a7eb0'); grad.addColorStop(1,'#332b4a');
  ctx.fillStyle = grad; ctx.fill();
  ctx.save(); jaggedPath(r,10,seed); ctx.clip();
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.arc(r*0.3,r*0.3,r*0.9,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = 'rgba(30,26,46,.5)';
  for (let i=0;i<4;i++){
    const a = hash(seed+i+10)*Math.PI*2, rad = hash(seed+i+15)*r*0.55;
    ctx.beginPath(); ctx.arc(Math.cos(a)*rad, Math.sin(a)*rad, 3+hash(seed+i+20)*4, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = 'rgba(190,170,255,.8)';
  for (let i=0;i<2;i++){
    const a = hash(seed+i+30)*Math.PI*2, rad = hash(seed+i+35)*r*0.6;
    ctx.beginPath(); ctx.arc(Math.cos(a)*rad, Math.sin(a)*rad, 1.6, 0, Math.PI*2); ctx.fill();
  }
}

function roundRectPath(x,y,w,h,rad){
  ctx.beginPath();
  ctx.moveTo(x+rad,y);
  ctx.arcTo(x+w,y,x+w,y+h,rad);
  ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad);
  ctx.arcTo(x,y,x+w,y,rad);
  ctx.closePath();
}

/* Anchored hazard drawers. Drawer space: y=0 at the rooted edge, +y grows into
   the play field, tip at y=height; x ∈ [-r, r]. Theme dispatch flips for ceiling. */

/* 🌳 meadow — tree: trunk rooted at the edge, leafy crown near the tip */
function drawTreeAnchored(r,height,seed){
  // crown sits near the tip; trunk runs from the base up INTO the crown centre
  // so the two always stay connected regardless of how tall the tree is
  const crownCy = height - r*0.7;
  const tg = ctx.createLinearGradient(-r*0.2,0,r*0.2,0);
  tg.addColorStop(0,'#8a6238'); tg.addColorStop(0.5,'#a0743f'); tg.addColorStop(1,'#5c4023');
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.moveTo(-r*0.22, 0); ctx.lineTo(-r*0.14, crownCy);
  ctx.lineTo(r*0.14, crownCy); ctx.lineTo(r*0.22, 0); ctx.closePath(); ctx.fill();
  ctx.save(); ctx.translate(0, crownCy);
  const cg = ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r*1.05);
  cg.addColorStop(0,'#b6f08a'); cg.addColorStop(0.55,'#6cc043'); cg.addColorStop(1,'#3f7a26');
  lumpPath(r*0.95, 6, 0.42, seed, 0.62); ctx.fillStyle = cg; ctx.fill();
  ctx.save(); lumpPath(r*0.95,6,0.42,seed,0.62); ctx.clip();
  ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.arc(r*0.3,r*0.3,r*0.85,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.restore();
}

/* 🌊 ocean — coral stalk: branching tower growing from the edge */
function drawCoralAnchored(r,height,seed){
  const grad = ctx.createLinearGradient(-r,0,r,0);
  grad.addColorStop(0,'#e0709f'); grad.addColorStop(0.5,'#ffb3d2'); grad.addColorStop(1,'#c44f7a');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-r*0.55, 0);
  ctx.lineTo(-r*0.32, height*0.85);
  ctx.quadraticCurveTo(0, height+r*0.15, r*0.32, height*0.85);
  ctx.lineTo(r*0.55, 0);
  ctx.closePath(); ctx.fill();
  // side branches
  for (let i=0;i<3;i++){
    const by = height*(0.35+i*0.2), dir = i%2===0?1:-1;
    ctx.beginPath();
    ctx.moveTo(dir*r*0.3, by);
    ctx.quadraticCurveTo(dir*r*0.85, by+r*0.1, dir*r*0.8, by+r*0.55);
    ctx.lineWidth=r*0.3; ctx.strokeStyle=grad; ctx.lineCap='round'; ctx.stroke();
  }
  // polyp knobs
  ctx.fillStyle='#ffd0e4';
  for (let i=0;i<6;i++){
    const py = height*(0.2+hash(seed+i)*0.75), px=(hash(seed+i+5)-0.5)*r*0.7;
    ctx.beginPath(); ctx.arc(px,py,r*0.12,0,Math.PI*2); ctx.fill();
  }
}

/* 🏜️ desert — saguaro cactus rooted at the edge with two arms */
function drawCactusAnchored(r,height,seed){
  const grad = ctx.createLinearGradient(-r*0.5,0,r*0.5,0);
  grad.addColorStop(0,'#4f8a37'); grad.addColorStop(0.5,'#8ecf6a'); grad.addColorStop(1,'#4f8a37');
  ctx.fillStyle = grad;
  roundRectPath(-r*0.4, 0, r*0.8, height, r*0.38); ctx.fill();
  const armY = height*0.55;
  roundRectPath(-r*0.95, armY, r*0.55, r*0.3, r*0.14); ctx.fill();
  roundRectPath(-r*0.95, armY-r*0.5, r*0.28, r*0.55, r*0.13); ctx.fill();
  roundRectPath(r*0.4, armY-r*0.2, r*0.55, r*0.3, r*0.14); ctx.fill();
  roundRectPath(r*0.67, armY-r*0.75, r*0.28, r*0.6, r*0.13); ctx.fill();
  ctx.strokeStyle='rgba(40,80,20,.35)'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(-r*0.15,r*0.2); ctx.lineTo(-r*0.15,height-r*0.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.15,r*0.2); ctx.lineTo(r*0.15,height-r*0.2); ctx.stroke();
  ctx.fillStyle='#ffe9a8';   // little flowers at the tip
  ctx.beginPath(); ctx.arc(0,height-r*0.1,r*0.16,0,Math.PI*2); ctx.fill();
}

/* 🌋 volcano — basalt spire with glowing lava cracks, pointed tip */
function drawLavaSpireAnchored(r,height,seed){
  ctx.beginPath();
  ctx.moveTo(-r*0.7, 0);
  ctx.lineTo(-r*0.28, height*0.7);
  ctx.lineTo(0, height);
  ctx.lineTo(r*0.28, height*0.7);
  ctx.lineTo(r*0.7, 0);
  ctx.closePath();
  const grad = ctx.createLinearGradient(-r*0.5,0,r*0.5,0);
  grad.addColorStop(0,'#15100f'); grad.addColorStop(0.5,'#4a3c3a'); grad.addColorStop(1,'#15100f');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle='rgba(255,110,40,.9)'; ctx.lineWidth=2.4;
  ctx.beginPath(); ctx.moveTo(-r*0.1,r*0.1); ctx.lineTo(r*0.05,height*0.4); ctx.lineTo(-r*0.08,height*0.75); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.25,r*0.2); ctx.lineTo(r*0.12,height*0.5); ctx.stroke();
  ctx.fillStyle='rgba(255,180,70,.95)';
  for (let i=0;i<3;i++){
    const py=height*(0.2+hash(seed+i)*0.6), px=(hash(seed+i+5)-0.5)*r*0.3;
    ctx.beginPath(); ctx.arc(px,py,1.8,0,Math.PI*2); ctx.fill();
  }
}

/* 🌌 space — crystal cluster: angular shards pointing into the field */
function drawCrystalAnchored(r,height,seed){
  const shards = [
    {x:-r*0.45, w:r*0.4,  h:height*0.7},
    {x: r*0.0,  w:r*0.55, h:height},
    {x: r*0.5,  w:r*0.38, h:height*0.62}
  ];
  for (const s of shards){
    const grad = ctx.createLinearGradient(s.x-s.w,0,s.x+s.w,0);
    grad.addColorStop(0,'#5e4f9a'); grad.addColorStop(0.5,'#b9a6ff'); grad.addColorStop(1,'#3a2e6a');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(s.x-s.w*0.5, 0);
    ctx.lineTo(s.x-s.w*0.32, s.h*0.7);
    ctx.lineTo(s.x, s.h);
    ctx.lineTo(s.x+s.w*0.32, s.h*0.7);
    ctx.lineTo(s.x+s.w*0.5, 0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(s.x, s.h*0.1); ctx.lineTo(s.x, s.h*0.92); ctx.stroke();
  }
  ctx.fillStyle='rgba(220,200,255,.85)';
  for (let i=0;i<3;i++){
    const py=height*(0.3+hash(seed+i)*0.6), px=(hash(seed+i+9)-0.5)*r;
    ctx.beginPath(); ctx.arc(px,py,1.4,0,Math.PI*2); ctx.fill();
  }
}

/* 🌳 meadow — bamboo stalks with node rings and leaf tufts */
function drawBambooObstacle(x,w,top,by,capH,capOver){
  const grad = ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0,'#9bdb5e'); grad.addColorStop(0.5,'#c8f08a');
  grad.addColorStop(0.5,'#c8f08a'); grad.addColorStop(1,'#7ec94a');
  ctx.fillStyle = grad;
  rr(x, 0, w, top-capH, 0);
  rr(x, by+capH, w, PLAYFIELD-(by+capH), 0);
  rr(x-capOver, top-capH, w+capOver*2, capH, 10);
  rr(x-capOver, by, w+capOver*2, capH, 10);
  ctx.strokeStyle='rgba(80,130,40,.55)'; ctx.lineWidth=3;
  for (let y=18; y<top-capH; y+=32){ ctx.beginPath(); ctx.moveTo(x+2,y); ctx.lineTo(x+w-2,y); ctx.stroke(); }
  for (let y=by+capH+18; y<PLAYFIELD; y+=32){ ctx.beginPath(); ctx.moveTo(x+2,y); ctx.lineTo(x+w-2,y); ctx.stroke(); }
  ctx.fillStyle = '#5fae37';
  leafTuft(x+w*0.18, top-capH); leafTuft(x+w*0.82, by+capH);
  ctx.strokeStyle='#4f9a2c'; ctx.lineWidth=3;
  ctx.strokeRect(x, 0, w, top-capH);
  ctx.strokeRect(x, by+capH, w, PLAYFIELD-(by+capH));
}
function leafTuft(x,y){
  ctx.save(); ctx.translate(x,y);
  ctx.beginPath(); ctx.ellipse(-7,-4,8,3,-0.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7,-6,8,3,0.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

/* 🏜️ desert — layered sandstone pillars with jagged rocky tips */
function drawRockObstacle(x,w,top,by,seed){
  const grad = ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0,'#c9954f'); grad.addColorStop(0.5,'#e7c685');
  grad.addColorStop(0.5,'#e7c685'); grad.addColorStop(1,'#a87b3f');
  ctx.fillStyle = grad;
  ctx.fillRect(x, 0, w, top);
  ctx.fillRect(x, by, w, PLAYFIELD-by);
  const segs=6, segW=w/segs;
  for (let i=0;i<=segs;i++){
    const nx = x+i*segW;
    ctx.beginPath();
    ctx.moveTo(nx-segW*0.5, top); ctx.lineTo(nx, top+hash(seed+i)*14); ctx.lineTo(nx+segW*0.5, top);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(nx-segW*0.5, by); ctx.lineTo(nx, by-hash(seed+i+30)*14); ctx.lineTo(nx+segW*0.5, by);
    ctx.closePath(); ctx.fill();
  }
  ctx.strokeStyle='rgba(120,80,40,.35)'; ctx.lineWidth=2;
  for (let y=16;y<top;y+=22){ ctx.beginPath(); ctx.moveTo(x+2,y); ctx.lineTo(x+w-2,y); ctx.stroke(); }
  for (let y=by+16;y<PLAYFIELD;y+=22){ ctx.beginPath(); ctx.moveTo(x+2,y); ctx.lineTo(x+w-2,y); ctx.stroke(); }
  ctx.strokeStyle='#7a5a2c'; ctx.lineWidth=3;
  ctx.strokeRect(x, 0, w, top);
  ctx.strokeRect(x, by, w, PLAYFIELD-by);
}

/* 🌊 ocean — coral towers with knobby polyps and swaying seaweed fronds */
function drawCoralObstacle(x,w,top,by,seed){
  const grad = ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0,'#ff9fc2'); grad.addColorStop(0.5,'#ffc2dd');
  grad.addColorStop(0.5,'#ffc2dd'); grad.addColorStop(1,'#e0709f');
  ctx.fillStyle = grad;
  ctx.fillRect(x, 0, w, top);
  ctx.fillRect(x, by, w, PLAYFIELD-by);
  ctx.fillStyle = grad;
  for (let y=10; y<top-10; y+=18){
    if (hash(seed+y)   > 0.5) { ctx.beginPath(); ctx.arc(x,   y, 7, 0, Math.PI*2); ctx.fill(); }
    if (hash(seed+y+5) > 0.5) { ctx.beginPath(); ctx.arc(x+w, y, 7, 0, Math.PI*2); ctx.fill(); }
  }
  for (let y=by+10; y<PLAYFIELD-10; y+=18){
    if (hash(seed+y+50) > 0.5) { ctx.beginPath(); ctx.arc(x,   y, 7, 0, Math.PI*2); ctx.fill(); }
    if (hash(seed+y+55) > 0.5) { ctx.beginPath(); ctx.arc(x+w, y, 7, 0, Math.PI*2); ctx.fill(); }
  }
  ctx.strokeStyle = '#3fae7a'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  for (let i=0;i<3;i++){
    const fx = x + w*(0.2+i*0.3);
    const sway = Math.sin(frame*0.08+i+seed)*8;
    ctx.beginPath(); ctx.moveTo(fx, top); ctx.quadraticCurveTo(fx+sway, top-14, fx+sway*1.4, top-26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx, by);  ctx.quadraticCurveTo(fx+sway, by+14,  fx+sway*1.4, by+26);  ctx.stroke();
  }
  ctx.strokeStyle='#c44f7a'; ctx.lineWidth=3;
  ctx.strokeRect(x, 0, w, top);
  ctx.strokeRect(x, by, w, PLAYFIELD-by);
}

/* 🌋 volcano — charred rock pillars veined with glowing lava cracks */
function drawLavaRockObstacle(x,w,top,by,seed){
  const grad = ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0,'#2b2424'); grad.addColorStop(0.5,'#4a3c3a');
  grad.addColorStop(0.5,'#4a3c3a'); grad.addColorStop(1,'#1c1717');
  ctx.fillStyle = grad;
  ctx.fillRect(x, 0, w, top);
  ctx.fillRect(x, by, w, PLAYFIELD-by);
  const segs=6, segW=w/segs;
  for (let i=0;i<=segs;i++){
    const nx = x+i*segW;
    ctx.beginPath();
    ctx.moveTo(nx-segW*0.5, top); ctx.lineTo(nx, top+hash(seed+i+500)*14); ctx.lineTo(nx+segW*0.5, top);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(nx-segW*0.5, by); ctx.lineTo(nx, by-hash(seed+i+530)*14); ctx.lineTo(nx+segW*0.5, by);
    ctx.closePath(); ctx.fill();
  }
  ctx.strokeStyle = 'rgba(255,110,40,.85)'; ctx.lineWidth = 2.5;
  for (let i=0;i<3;i++){
    const cx0 = x + 8 + hash(seed+i+600)*(w-16);
    let cy = 14 + hash(seed+i+610)*Math.max(top-30,1);
    ctx.beginPath(); ctx.moveTo(cx0, Math.max(cy-20,4));
    for (let s=0;s<3;s++){ cy += 12; ctx.lineTo(cx0 + (hash(seed+i+s+620)-0.5)*14, Math.min(cy, top-6)); }
    ctx.stroke();
  }
  for (let i=0;i<3;i++){
    const cx0 = x + 8 + hash(seed+i+700)*(w-16);
    let cy = by + 14 + hash(seed+i+710)*Math.max(PLAYFIELD-by-30,1);
    ctx.beginPath(); ctx.moveTo(cx0, Math.max(cy-20,by+4));
    for (let s=0;s<3;s++){ cy += 12; ctx.lineTo(cx0 + (hash(seed+i+s+720)-0.5)*14, Math.min(cy, PLAYFIELD-6)); }
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,170,60,.9)';
  for (let i=0;i<3;i++){
    const ey = Math.min(top-8, 20+hash(seed+i+800)*Math.max(top-40,1));
    if (ey>4){ ctx.beginPath(); ctx.arc(x+10+hash(seed+i)*(w-20), ey, 1.8, 0, Math.PI*2); ctx.fill(); }
  }
  ctx.strokeStyle='#100d0d'; ctx.lineWidth=3;
  ctx.strokeRect(x, 0, w, top);
  ctx.strokeRect(x, by, w, PLAYFIELD-by);
}

/* ❄️ arctic — icicle spikes with frosty glints */
function drawIcicleObstacle(x,w,top,by,seed){
  const grad = ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0,'#bfe6f5'); grad.addColorStop(0.5,'#eaf8ff');
  grad.addColorStop(0.5,'#eaf8ff'); grad.addColorStop(1,'#8fc9e0');
  ctx.fillStyle = grad;
  ctx.fillRect(x, 0, w, top);
  ctx.fillRect(x, by, w, PLAYFIELD-by);
  const segs=5, segW=w/segs;
  for (let i=0;i<=segs;i++){
    const nx = x+i*segW;
    const len1 = 10+hash(seed+i)*22;
    ctx.beginPath();
    ctx.moveTo(nx-segW*0.35, top); ctx.lineTo(nx, top+len1); ctx.lineTo(nx+segW*0.35, top);
    ctx.closePath(); ctx.fill();
    const len2 = 10+hash(seed+i+40)*22;
    ctx.beginPath();
    ctx.moveTo(nx-segW*0.35, by); ctx.lineTo(nx, by-len2); ctx.lineTo(nx+segW*0.35, by);
    ctx.closePath(); ctx.fill();
  }
  for (let i=0;i<4;i++){
    const gy = Math.min(top-8, 16+hash(seed+i+80)*Math.max(top-30,1));
    if (gy>4){
      const tw = 0.5+0.5*Math.sin(frame*0.15+i+seed);
      ctx.fillStyle = 'rgba(255,255,255,'+(0.9*tw)+')';
      ctx.beginPath(); ctx.arc(x+8+hash(seed+i)*(w-16), gy, 1.6, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.strokeStyle='#6fb0cc'; ctx.lineWidth=3;
  ctx.strokeRect(x, 0, w, top);
  ctx.strokeRect(x, by, w, PLAYFIELD-by);
}

/* 🌃 city — riveted steel girders with hazard-striped flanges */
function drawGirderObstacle(x,w,top,by,capH,capOver){
  const grad = ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0,'#8a8f9a'); grad.addColorStop(0.5,'#c3c8d1');
  grad.addColorStop(0.5,'#c3c8d1'); grad.addColorStop(1,'#5d6168');
  ctx.fillStyle = grad;
  rr(x, 0, w, top-capH, 0);
  rr(x, by+capH, w, PLAYFIELD-(by+capH), 0);
  ctx.fillStyle = '#4a4e55';
  rr(x-capOver, top-capH, w+capOver*2, capH, 4);
  rr(x-capOver, by, w+capOver*2, capH, 4);
  ctx.fillStyle = '#ffce33';
  for (let sx=0; sx<w+capOver*2; sx+=16) {
    if (Math.floor(sx/16)%2===0) continue;
    ctx.fillRect(x-capOver+sx, top-capH+3, 8, capH-6);
    ctx.fillRect(x-capOver+sx, by+3, 8, capH-6);
  }
  ctx.fillStyle='rgba(40,40,46,.6)';
  for (let y=14; y<top-capH; y+=24){
    ctx.beginPath(); ctx.arc(x+8,y,2.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w-8,y,2.6,0,Math.PI*2); ctx.fill();
  }
  for (let y=by+capH+14; y<PLAYFIELD; y+=24){
    ctx.beginPath(); ctx.arc(x+8,y,2.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w-8,y,2.6,0,Math.PI*2); ctx.fill();
  }
  ctx.strokeStyle='#3d4046'; ctx.lineWidth=3;
  ctx.strokeRect(x, 0, w, top-capH);
  ctx.strokeRect(x, by+capH, w, PLAYFIELD-(by+capH));
}

/* 🌌 space — pitted asteroid chunks with glowing mineral veins */
function drawAsteroidObstacle(x,w,top,by,seed){
  const grad = ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0,'#5b5470'); grad.addColorStop(0.5,'#857fa0');
  grad.addColorStop(0.5,'#857fa0'); grad.addColorStop(1,'#433d58');
  ctx.fillStyle = grad;
  ctx.fillRect(x, 0, w, top);
  ctx.fillRect(x, by, w, PLAYFIELD-by);
  const segs=6, segW=w/segs;
  for (let i=0;i<=segs;i++){
    const nx = x+i*segW;
    ctx.beginPath();
    ctx.moveTo(nx-segW*0.5, top); ctx.lineTo(nx, top+hash(seed+i+80)*16); ctx.lineTo(nx+segW*0.5, top);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(nx-segW*0.5, by); ctx.lineTo(nx, by-hash(seed+i+110)*16); ctx.lineTo(nx+segW*0.5, by);
    ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle='rgba(30,26,46,.5)';
  for (let i=0;i<5;i++){
    const cy = Math.min(top-10, 20 + hash(seed+i+200)*Math.max(top-40,1));
    if (cy>4) { ctx.beginPath(); ctx.arc(x+10+hash(seed+i)*(w-20), cy, 4+hash(seed+i+5)*4, 0, Math.PI*2); ctx.fill(); }
  }
  for (let i=0;i<5;i++){
    const cy = by + Math.min(PLAYFIELD-by-10, 20 + hash(seed+i+300)*Math.max(PLAYFIELD-by-40,1));
    if (cy<PLAYFIELD-4) { ctx.beginPath(); ctx.arc(x+10+hash(seed+i+1)*(w-20), cy, 4+hash(seed+i+6)*4, 0, Math.PI*2); ctx.fill(); }
  }
  ctx.fillStyle = 'rgba(190,170,255,.85)';
  for (let i=0;i<3;i++){
    const cy = Math.min(top-6, 30+hash(seed+i+400)*Math.max(top-50,1));
    if (cy>4) { ctx.beginPath(); ctx.arc(x+w/2, cy, 1.7,0,Math.PI*2); ctx.fill(); }
  }
  ctx.strokeStyle='#2e2840'; ctx.lineWidth=3;
  ctx.strokeRect(x, 0, w, top);
  ctx.strokeRect(x, by, w, PLAYFIELD-by);
}
function rr(x,y,w,h,r){
  if(h<=0) return;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath(); ctx.fill();
}

function drawCoin(c){
  ctx.save(); ctx.translate(c.x,c.y);
  const sx = Math.abs(Math.sin(frame*0.08)); // spin
  ctx.scale(sx*0.8+0.2, 1);
  ctx.fillStyle='#ffd23f'; ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffe98a'; ctx.beginPath(); ctx.arc(0,0,c.r*0.6,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#e0a800'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawPowerup(pu){
  const y = pu.y + Math.sin(pu.bob)*5;
  const def = POWERS[pu.type];
  ctx.save();
  ctx.shadowColor = def.color; ctx.shadowBlur = 18;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(pu.x, y, pu.r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = def.color;
  ctx.beginPath(); ctx.arc(pu.x, y, pu.r-4, 0, Math.PI*2); ctx.fill();
  drawPowerGlyph(pu.type, pu.x, y, (pu.r-4)*1.8, '#fff');
  ctx.restore();
}

function drawBird(){
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot);

  // shield aura
  if (powerActive('shield')) {
    ctx.strokeStyle = 'rgba(70,224,200,'+(0.5+0.3*Math.sin(frame*0.3))+')';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0,0,bird.r+9,0,Math.PI*2); ctx.stroke();
  }

  // squash on flap, stretch on fall
  const _ff=bird.flapTimer>0?bird.flapTimer/8:0;
  const _rf=bird.flapTimer===0?Math.max(0,Math.min(1,(bird.vy-1.5)/7)):0;
  ctx.scale(1+_ff*0.28-_rf*0.12, 1-_ff*0.30+_rf*0.22);
  drawBirdSkin(currentSkin(), bird.flapTimer);
  ctx.restore();
}

function drawGround(){
  ctx.fillStyle=rgbStr(sceneColors.groundTop);
  ctx.fillRect(0,PLAYFIELD,W,GROUND_H);
  ctx.fillStyle=rgbStr(sceneColors.groundPath);
  for(let x=-48;x<W+48;x+=48){
    ctx.fillRect(x - scrollX, PLAYFIELD, 24, 14);
  }
  ctx.fillStyle=rgbStr(sceneColors.edge);
  ctx.fillRect(0,PLAYFIELD-6,W,8);
  ctx.fillStyle=rgbStr(sceneColors.edge2);
  for(let x=-48;x<W+48;x+=16){
    ctx.beginPath();
    ctx.moveTo(x - (scrollX%16), PLAYFIELD-6);
    ctx.lineTo(x+8-(scrollX%16), PLAYFIELD-14);
    ctx.lineTo(x+16-(scrollX%16), PLAYFIELD-6);
    ctx.fill();
  }
}

function drawParticles(){
  for(const pt of particles){
    ctx.globalAlpha = pt.life/pt.max;
    ctx.fillStyle = pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// drawn gold coin — replaces the 💰 emoji which tofus on some mobile WebViews
function coinIcon(x, y, r){
  const g = ctx.createRadialGradient(x-r*0.35, y-r*0.35, r*0.2, x, y, r);
  g.addColorStop(0, '#ffe98a'); g.addColorStop(1, '#e0a800');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff0b0';
  ctx.beginPath(); ctx.arc(x, y, r*0.55, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c98f00'; ctx.lineWidth = Math.max(1, r*0.14);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
}
// draw a centered "[coin] text" line; returns nothing
function coinLabel(text, cx, cy, fontPx, bold, color){
  setFont(fontPx, bold);
  ctx.textBaseline = 'middle';
  const tw = ctx.measureText(text).width;
  const r = fontPx*0.5, gap = fontPx*0.32;
  const startX = cx - (r*2 + gap + tw)/2;
  coinIcon(startX + r, cy, r);
  ctx.fillStyle = color; ctx.textAlign = 'left';
  ctx.fillText(text, startX + r*2 + gap, cy);
}

function drawHUD(){
  // score with pop bounce
  const _ss=1+(scoreAnim/12)*0.35;
  ctx.save(); ctx.translate(W/2,39); ctx.scale(_ss,_ss);
  ctx.font='bold 52px Mali'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineWidth=6; ctx.strokeStyle='rgba(0,0,0,.35)';
  ctx.strokeText(score,0,0);
  ctx.fillStyle=combo>=10?'#ff7b3a':combo>=5?'#ffd23f':'#fff';
  ctx.fillText(score,0,0);
  ctx.restore();
  // combo badge
  if(combo>=3&&comboTimer>0){ const _ca=Math.min(1,comboTimer/25); ctx.globalAlpha=_ca; ctx.fillStyle=combo>=10?'#ff4444':combo>=5?'#ff9f1c':'#7ad24f'; ctx.font='bold 14px Mali'; ctx.textAlign='center'; ctx.textBaseline='top'; ctx.fillText('x'+combo+' COMBO!',W/2,74); ctx.globalAlpha=1; }
  // near-miss toast (floats up from where bird was)
  if(nearMissTimer>0){ const _na=Math.min(1,nearMissTimer/30); const _ny=nearMissY-(80-nearMissTimer)*0.55; ctx.globalAlpha=_na; ctx.font='bold 18px Mali'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.strokeText('NEAR MISS! +1',W/2,_ny); ctx.fillStyle='#ffd23f'; ctx.fillText('NEAR MISS! +1',W/2,_ny); ctx.globalAlpha=1; }

  // coins
  ctx.font='bold 20px Mali'; ctx.textAlign='left';
  ctx.fillStyle='#ffd23f'; ctx.beginPath(); ctx.arc(24,30,10,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=3; ctx.strokeText('x '+coinCount, 40, 20);
  ctx.fillStyle='#fff'; ctx.fillText('x '+coinCount, 40, 20);

  // active power-up bars
  let py = 60, idx=0;
  for (const k in active) {
    if (active[k]<=0) continue;
    const def = POWERS[k];
    const w = 86, frac = active[k]/def.dur;
    ctx.fillStyle='rgba(0,0,0,.25)'; rr(12, py, w, 16, 8);
    ctx.fillStyle=def.color; rr(12, py, w*frac, 16, 8);
    const gs=13; drawPowerGlyph(k, 16+gs/2, py+9, gs, '#fff');
    ctx.fillStyle='#fff'; ctx.font='12px Mali, sans-serif'; ctx.textBaseline='middle'; ctx.textAlign='left';
    ctx.fillText(def.label, 16+gs+4, py+9);
    py += 22; idx++;
  }

  if (Sound.muted){ drawIcon('mute', W-22, 18, 20, 'rgba(255,255,255,.8)'); }

  // level-clear mode: level badge + progress bar with checkpoint ticks + bird marker
  if (playMode === 'levels') {
    ctx.font='bold 18px Mali'; ctx.textAlign='right'; ctx.textBaseline='top';
    ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,.3)';
    const lvlText = 'Level '+level;
    ctx.strokeText(lvlText, W-14, 40);
    ctx.fillStyle='#fff'; ctx.fillText(lvlText, W-14, 40);

    const frac = Math.min(score/LEVEL_GOAL, 1);
    const bw=120, bh=10, bx=W-14-bw, by=66;
    ctx.fillStyle='rgba(0,0,0,.28)'; rr(bx,by,bw,bh,bh/2);
    ctx.fillStyle='#ffd23f'; rr(bx,by, Math.max(bh, bw*frac), bh, bh/2);
    // 3 small checkpoint ticks dividing the bar
    ctx.fillStyle='rgba(255,255,255,.55)';
    for (let i=1;i<=3;i++){ const tx = bx + bw*(i/4); ctx.fillRect(tx-1, by+2, 2, bh-4); }
    // little bird flying along the bar at the current progress
    ctx.save();
    ctx.translate(bx + bw*frac, by + bh/2);
    ctx.scale(0.4, 0.4);
    drawBirdSkin(currentSkin(), (frame%20<10)?8:0);
    ctx.restore();
  }

  // scene-change toast
  if (sceneToastTimer > 0) {
    const sc = SCENES[sceneToastIdx];
    ctx.globalAlpha = Math.min(1, sceneToastTimer/30);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const _tIS=24, _tGp=6;
    ctx.font='bold 22px Mali';
    const _tTW=ctx.measureText(sc.name).width;
    const _tSX=W/2-(_tIS+_tGp+_tTW)/2;
    drawThemeIcon(sc.id, _tSX+_tIS/2, 110, _tIS);
    ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.35)';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.strokeText(sc.name, _tSX+_tIS+_tGp, 110);
    ctx.fillStyle='#fff'; ctx.fillText(sc.name, _tSX+_tIS+_tGp, 110);
    ctx.globalAlpha = 1;
  }
}

function panel(x,y,w,h){
  ctx.fillStyle='rgba(255,255,255,.92)';
  rr(x,y,w,h,18);
  ctx.strokeStyle='#ffd23f'; ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(x+18,y); ctx.arcTo(x+w,y,x+w,y+h,18);
  ctx.arcTo(x+w,y+h,x,y+h,18); ctx.arcTo(x,y+h,x,y,18);
  ctx.arcTo(x,y,x+w,y,18); ctx.closePath(); ctx.stroke();
}

// shrink the font until `text` fits maxWidth. Mali is embedded (with Thai
// glyphs) so measureText() is now accurate across devices; a small 8% margin
// stays as a backstop for emoji that the system still renders.
function setFont(size, bold){ ctx.font = (bold?'bold ':'') + size + 'px Mali, sans-serif'; }
function fitFont(text, maxWidth, baseSize, bold){
  let size = baseSize;
  setFont(size, bold);
  while (ctx.measureText(text).width * 1.08 > maxWidth && size > 8) { size--; setFont(size, bold); }
  return size;
}
function button(x,y,w,h,label,bg,fg,action,iconId){
  ctx.fillStyle=bg; rr(x,y,w,h,12);
  ctx.fillStyle=fg; ctx.textBaseline='middle';
  if (iconId) {
    const isz = Math.min(h*0.5, 22), gap = isz*0.45;
    const ts = fitFont(label, w - isz - gap - 24, 18, true);
    const tw = ctx.measureText(label).width;
    const startX = x + w/2 - (isz+gap+tw)/2;
    drawIcon(iconId, startX + isz/2, y+h/2, isz, fg);
    ctx.textAlign='left'; setFont(ts, true);
    ctx.fillText(label, startX + isz + gap, y+h/2+1);
  } else {
    ctx.textAlign='center';
    fitFont(label, w-30, 18, true);
    ctx.fillText(label, x+w/2, y+h/2+1);
  }
  uiButtons.push({x,y,w,h,action});
}

// pure vector UI icons — no font/emoji dependency, identical on every device
function drawIcon(id, cx, cy, s, color){
  color = color || '#fff';
  ctx.save(); ctx.translate(cx,cy);
  const r = s/2;
  ctx.fillStyle=color; ctx.strokeStyle=color;
  ctx.lineWidth=Math.max(2, s*0.12); ctx.lineCap='round'; ctx.lineJoin='round';
  if (id==='play'){ ctx.beginPath(); ctx.moveTo(-r*0.5,-r*0.72); ctx.lineTo(r*0.78,0); ctx.lineTo(-r*0.5,r*0.72); ctx.closePath(); ctx.fill(); }
  else if (id==='back'){ ctx.beginPath(); ctx.moveTo(r*0.45,-r*0.6); ctx.lineTo(-r*0.5,0); ctx.lineTo(r*0.45,r*0.6); ctx.stroke(); }
  else if (id==='retry'){
    ctx.beginPath(); ctx.arc(0,0,r*0.68,-0.5,Math.PI*1.45); ctx.stroke();
    const a=-0.5, ax=Math.cos(a)*r*0.68, ay=Math.sin(a)*r*0.68;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(ax-r*0.34,ay-r*0.02); ctx.moveTo(ax,ay); ctx.lineTo(ax+r*0.02,ay-r*0.36); ctx.stroke();
  }
  else if (id==='menu'){ ctx.beginPath(); ctx.moveTo(-r*0.72,-r*0.02); ctx.lineTo(0,-r*0.72); ctx.lineTo(r*0.72,-r*0.02); ctx.stroke(); ctx.fillRect(-r*0.5,-r*0.02,r,r*0.62); }
  else if (id==='shop'){
    ctx.beginPath(); ctx.moveTo(-r*0.78,-r*0.55); ctx.lineTo(-r*0.45,-r*0.55); ctx.lineTo(-r*0.18,r*0.28); ctx.lineTo(r*0.6,r*0.28); ctx.lineTo(r*0.78,-r*0.28); ctx.lineTo(-r*0.28,-r*0.28); ctx.stroke();
    ctx.beginPath(); ctx.arc(-r*0.05,r*0.58,r*0.13,0,Math.PI*2); ctx.arc(r*0.5,r*0.58,r*0.13,0,Math.PI*2); ctx.fill();
  }
  else if (id==='levels'){ ctx.beginPath(); ctx.moveTo(-r*0.5,-r*0.78); ctx.lineTo(-r*0.5,r*0.78); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-r*0.5,-r*0.78); ctx.lineTo(r*0.6,-r*0.45); ctx.lineTo(-r*0.5,-r*0.12); ctx.closePath(); ctx.fill(); }
  else if (id==='endless'){ ctx.beginPath(); ctx.arc(-r*0.38,0,r*0.36,0,Math.PI*2); ctx.moveTo(r*0.74,0); ctx.arc(r*0.38,0,r*0.36,0,Math.PI*2); ctx.stroke(); }
  else if (id==='target'){ ctx.beginPath(); ctx.arc(0,0,r*0.72,0,Math.PI*2); ctx.moveTo(r*0.36,0); ctx.arc(0,0,r*0.36,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,r*0.1,0,Math.PI*2); ctx.fill(); }
  else if (id==='palette'){ ctx.beginPath(); ctx.arc(0,0,r*0.72,0,Math.PI*2); ctx.stroke(); for(let i=0;i<4;i++){const a=i*1.35-0.5; ctx.beginPath(); ctx.arc(Math.cos(a)*r*0.4,Math.sin(a)*r*0.4,r*0.12,0,Math.PI*2); ctx.fill();} }
  else if (id==='trophy'){
    ctx.beginPath(); ctx.moveTo(-r*0.5,-r*0.62); ctx.lineTo(r*0.5,-r*0.62); ctx.lineTo(r*0.36,r*0.05); ctx.lineTo(-r*0.36,r*0.05); ctx.closePath(); ctx.fill();
    ctx.lineWidth=Math.max(2,s*0.1);
    ctx.beginPath(); ctx.arc(-r*0.5,-r*0.32,r*0.22,Math.PI*0.5,Math.PI*1.5); ctx.stroke();
    ctx.beginPath(); ctx.arc(r*0.5,-r*0.32,r*0.22,Math.PI*1.5,Math.PI*0.5,true); ctx.stroke();
    ctx.fillRect(-r*0.09,r*0.05,r*0.18,r*0.32); ctx.fillRect(-r*0.32,r*0.37,r*0.64,r*0.14);
  }
  else if (id==='lock'){ ctx.lineWidth=Math.max(2,s*0.13); ctx.beginPath(); ctx.arc(0,-r*0.12,r*0.3,Math.PI,0); ctx.stroke(); roundRectPath(-r*0.42,-r*0.12,r*0.84,r*0.58,r*0.12); ctx.fill(); }
  else if (id==='star'){ ctx.beginPath(); for(let i=0;i<10;i++){const a=i/10*Math.PI*2-Math.PI/2; const rr=i%2?r*0.4:r*0.95; ctx[i?'lineTo':'moveTo'](Math.cos(a)*rr,Math.sin(a)*rr);} ctx.closePath(); ctx.fill(); }
  else if (id==='mute'){ ctx.beginPath(); ctx.moveTo(-r*0.15,-r*0.32); ctx.lineTo(-r*0.15,r*0.32); ctx.lineTo(r*0.08,r*0.32); ctx.lineTo(r*0.45,r*0.65); ctx.lineTo(r*0.45,-r*0.65); ctx.lineTo(r*0.08,-r*0.32); ctx.closePath(); ctx.fill(); ctx.lineWidth=Math.max(2,s*0.14); ctx.beginPath(); ctx.moveTo(-r*0.52,r*0.62); ctx.lineTo(r*0.62,-r*0.52); ctx.stroke(); }
  ctx.restore();
}

// power-up symbols (drawn, themed by the power's colour)
function drawPowerGlyph(type, cx, cy, s, color){
  ctx.save(); ctx.translate(cx,cy); const r=s/2;
  ctx.fillStyle=color; ctx.strokeStyle=color; ctx.lineWidth=Math.max(2,s*0.13); ctx.lineCap='round'; ctx.lineJoin='round';
  if (type==='shield'){ ctx.beginPath(); ctx.moveTo(0,-r*0.82); ctx.lineTo(r*0.72,-r*0.45); ctx.lineTo(r*0.72,r*0.1); ctx.quadraticCurveTo(r*0.72,r*0.7,0,r*0.92); ctx.quadraticCurveTo(-r*0.72,r*0.7,-r*0.72,r*0.1); ctx.lineTo(-r*0.72,-r*0.45); ctx.closePath(); ctx.fill(); }
  else if (type==='slow'){ ctx.beginPath(); ctx.arc(0,0,r*0.78,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-r*0.46); ctx.moveTo(0,0); ctx.lineTo(r*0.4,r*0.12); ctx.stroke(); }
  else if (type==='magnet'){ ctx.lineWidth=Math.max(3,s*0.24); ctx.beginPath(); ctx.arc(0,-r*0.12,r*0.52,Math.PI,0); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-r*0.52,-r*0.12); ctx.lineTo(-r*0.52,r*0.6); ctx.moveTo(r*0.52,-r*0.12); ctx.lineTo(r*0.52,r*0.6); ctx.stroke(); }
  else if (type==='x2'){ ctx.beginPath(); for(let i=0;i<10;i++){const a=i/10*Math.PI*2-Math.PI/2; const rr=i%2?r*0.4:r*0.92; ctx[i?'lineTo':'moveTo'](Math.cos(a)*rr,Math.sin(a)*rr);} ctx.closePath(); ctx.fill(); }
  ctx.restore();
}
